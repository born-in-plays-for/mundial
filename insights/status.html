<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">Plays for another country — elimination status</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<link rel="stylesheet" href="../css/global.css">
<link rel="stylesheet" href="../css/taxonomy.css">
<style>
  .chart-card {
    max-width: 900px;
    margin: 0 auto;
    background: #fcfcfb;
    border: 1px solid rgba(11,11,11,0.10);
    border-radius: 12px;
    padding: 22px 28px 20px;
  }
  .chart-card * { box-sizing: border-box; }

  /* Debug controls — team-by-team stepper + animation speed, surfaced below the
     chart. Labeled explicitly (unlike the earlier arrows-only iteration) so the
     purpose of each control reads without guessing. */
  #debugControls { display: flex; align-items: center; gap: 8px; margin-top: 14px; }
  #debugControls .debug-label {
    flex: 0 0 auto; font-size: 11px; color: #898781;
  }
  #speedSlider {}
  #debugControls button {
    flex: 0 0 auto; height: 22px; padding: 0 8px; border: 1px solid rgba(11,11,11,0.2);
    border-radius: 4px; background: #fff; cursor: pointer; font-size: 11px; line-height: 1;
    white-space: nowrap;
  }
  #debugControls button:hover { background: #f0f0ee; }
  #debugControls .form-check {
    flex: 0 0 auto; display: flex; align-items: center; gap: 4px; margin: 0;
  }
  #debugControls .form-check-label { font-size: 11px; color: #898781; }
  #debugControls .form-check-input { margin-top: 0; cursor: pointer; }

  /* Imports/exports flavor switch — reloads the page with ?metric= toggled (the
     sort key, bar color and all metric-flavored text are only ever computed at
     load time from that param, so switching flavors in place isn't an option). */
  .metric-toggle { display: flex; justify-content: center; gap: 6px; margin-bottom: 14px; }
  .metric-toggle button {
    font-size: 11px; padding: 4px 12px; border: 1px solid rgba(11,11,11,0.15);
    border-radius: 999px; background: #fff; cursor: pointer; color: #898781;
  }
  .metric-toggle button:hover:not(.active) { background: #f0f0ee; }
  .metric-toggle button.active {
    background: #0b0b0b; color: #fff; border-color: #0b0b0b; cursor: default;
  }

  /* Unified layout — same structure on desktop and mobile: [count][bar][name][flag],
     all left-aligned, read in that order. The count is the only fixed-width column;
     everything else (bar + name + flag) lives inside .anim-track so the bar's own
     width stays proportional to a consistent reference width across every row
     (crucial for bar-length comparability) while name+flag simply render in the
     leftover space right after wherever the bar ends. */
  .anim-row {
    min-height: 16px;
    display: flex;
    align-items: center;
    gap: 6px;
    /* Elimination is the whole row (count, bar, flag, name together) sliding left
       until it's clipped by .anim-stage's own overflow:hidden below — the row
       itself keeps its layout position/height (a blank slot), only its paint moves.
       Duration is always set inline from JS (animateRow), nothing declared here to
       duplicate/drift. */
    transition-property: transform;
  }
  /* Wraps every .anim-row — clips a row's translated-away paint once it's pushed
     past this container's own left edge (both share the same rendered width, so
     translateX(-100%) — 100% of the ROW's own width — lands it exactly there). */
  .anim-stage {
    overflow: hidden;
  }
  .anim-value {
    flex: 0 0 auto;
    min-width: 2ch;
    text-align: left;
    font-size: 10px;
    color: #898781;
    font-variant-numeric: tabular-nums;
  }

  .anim-track {
    position: relative;
    flex: 1 1 auto;
    min-width: 0;
    align-self: stretch;
  }
  /* ▶ is this app's fixed glyph for "imported/exported players" mirrored (css/
     taxonomy.css's --imp-accent/--exp-accent, .elo-item--imp::after / --exp::after
     use ◀/▶ pointing at a flag on the left of a value; here the value sits to the
     LEFT of the bar instead, so the arrow points right, toward the name+flag that
     follow) — the bar echoes it: the tip merges into the rectangle at its trailing
     (right) edge instead of its leading edge. */
  .anim-fill {
    position: absolute; left: 0; top: 50%;
    height: 10px;
    transform: translateY(-50%);
    min-width: 2px;
    border-radius: 4px 0 0 4px;
    clip-path: polygon(0 0, calc(100% - 5px) 0, 100% 50%, calc(100% - 5px) 100%, 0 100%);
    background: var(--fill-light, #c3c2b7);
    /* Set once at row-build time from the team's own active-metric count, then only
       ever touched again by applyMetric() when the imports/exports toggle flips —
       the transition below is for that switch, not for anything elimination does
       (elimination is purely the enclosing row sliding away, see .anim-row). */
    transition: width 0.5s ease, background-color 0.5s ease;
  }

  /* Flag + name (pillClasses/pillContent's .elo-item — DOM order is already
     flag-then-name, used as-is here), positioned right after the bar's own end
     (--pct, set once at row-build time from the row's fixed active-metric count, drives both
     `left` and `max-width` via calc so it never overflows the track — it ellipsizes
     instead if a long name has no room). For rows near the bottom of the list,
     where the bar eats most of the track and leaves too little room after it,
     refreshTailOverflowMode() below switches this to .anim-tail--overflow instead:
     right-aligned to the track's own right edge, spilling left over the bar (fully
     transparent — text sits directly on the bar, no backdrop) rather than being
     squeezed into near-nothing. */
  .anim-tail {
    position: absolute; top: 50%; transform: translateY(-50%);
    display: flex; align-items: center; gap: 4px;
    left: calc(var(--pct) + 6px);
    max-width: calc(100% - var(--pct) - 6px);
    overflow: hidden;
    transition: left 0.5s ease, max-width 0.5s ease;
  }
  .anim-tail.anim-tail--overflow {
    left: auto; right: 0;
    max-width: 100%;
  }
  /* Fully transparent all the way down — .anim-tail sits directly over the bar in
     overflow mode, and any background here (even translucent) reads as a boxy
     bubble rather than text overlapping the bar. */
  .anim-tail, #statusViz .anim-tail .elo-item, #statusViz .anim-tail .elo-name { background: transparent; }
  #statusViz .anim-tail .elo-item { padding: 1px 6px 1px 4px; gap: 3px; margin: 0; border: none; min-width: 0; }
  #statusViz .anim-tail .elo-flag { width: 14px; height: 14px; flex: 0 0 auto; }
  #statusViz .anim-tail .elo-name { min-width: 0; max-width: 140px; font-size: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .stage-wrap { position: relative; margin-top: 10px; }
  .mean-overlay {
    position: absolute; inset: 0;
    display: flex;
    align-items: stretch;
    gap: 6px;
    pointer-events: none;
  }
  .mean-col { position: relative; height: 100%; flex: 1 1 auto; }
  .mean-line {
    position: absolute;
    top: 0; bottom: 0;
    width: 0;
    border-left: 2px dashed #0b0b0b;
    opacity: 0.55;
    transition: left calc(0.9s * var(--speed, 1)) cubic-bezier(0.4, 0, 0.2, 1);
  }
  .mean-label {
    position: absolute;
    top: -17px;
    transform: translateX(-50%);
    font-size: 10px;
    font-weight: 600;
    color: #0b0b0b;
    white-space: nowrap;
    transition: left calc(0.9s * var(--speed, 1)) cubic-bezier(0.4, 0, 0.2, 1);
  }

  .sd-line {
    position: absolute;
    top: 0; bottom: 0;
    width: 0;
    border-left: 1px dashed #b5b4ab;
    transition: left calc(0.9s * var(--speed, 1)) cubic-bezier(0.4, 0, 0.2, 1), opacity calc(0.3s * var(--speed, 1)) ease;
  }
  .sd-label {
    position: absolute;
    bottom: -14px;
    transform: translateX(-50%);
    font-size: 9px;
    color: #98978f;
    white-space: nowrap;
    transition: left calc(0.9s * var(--speed, 1)) cubic-bezier(0.4, 0, 0.2, 1), opacity calc(0.3s * var(--speed, 1)) ease;
  }

  /* Real Bootstrap carousel (bootstrap.Carousel instance + data-bs-* controls/
     indicators — native swipe/keyboard/a11y). Its carousel-items only carry the
     lightweight .stage-caption text; the actual visualization is the persistent
     #stageWrap sibling, which morphs in place via applyState() on 'slide.bs.carousel'.
     Overrides below undo Bootstrap's full-bleed-image-carousel defaults (wide dark
     gradient buttons, large rectangular indicators) for this compact, understated look. */
  .stage-caption { text-align: center; padding: 2px 8px 10px; }
  .stage-title { font-size: 13px; font-weight: 600; color: #0b0b0b; }
  .stage-subtitle { font-size: 11px; color: #898781; margin-top: 2px; }

  #statusViz .carousel-control-prev,
  #statusViz .carousel-control-next {
    position: absolute; top: 0; bottom: 0;
    display: flex; align-items: center;
    width: 32px; border: 0; background: transparent; opacity: 0.35;
    z-index: 5; cursor: pointer;
  }
  #statusViz .carousel-control-prev { left: 0; justify-content: flex-start; }
  #statusViz .carousel-control-next { right: 0; justify-content: flex-end; }
  #statusViz .carousel-control-prev:hover,
  #statusViz .carousel-control-next:hover { opacity: 0.9; }
  #statusViz .carousel-control-prev:disabled,
  #statusViz .carousel-control-next:disabled { opacity: 0.1; pointer-events: none; }
  #statusViz .viz-control-prev-icon,
  #statusViz .viz-control-next-icon {
    width: 16px; height: 16px;
    filter: invert(40%);
  }
  #statusViz { position: relative; }
  #statusViz .carousel-indicators {
    position: static;
    display: flex; justify-content: center; margin: 12px 0 0; gap: 4px;
  }
  #statusViz .carousel-indicators button {
    width: 6px; height: 6px; border-radius: 50%;
    background-color: #ccc; opacity: 1; border: none;
    margin: 0 2px; padding: 0; cursor: pointer;
    text-indent: 0;
  }
  #statusViz .carousel-indicators button.active { background-color: #666; }

  /* Mobile: card padding + container gutter together eat a disproportionate share
     of a narrow viewport — trim both, including Bootstrap's own py-4. The row
     layout itself (.anim-row etc. above) is already the same structure on both
     breakpoints, so nothing row-specific is needed here. */
  @media (max-width: 767.98px) {
    #main-content { padding: 0.5rem 0.25rem; }
    /* Bottom padding needs enough clearance for .sd-label, which sits 14px below
       the row list's own bottom edge (see .sd-label) — 10px isn't enough room and
       the label overflows past the card. */
    .chart-card { padding: 10px 6px 28px; }
    .stage-caption { padding: 0 4px 6px; }
    .stage-title { font-size: 12px; }
    .stage-subtitle { font-size: 10px; }
    .stage-wrap { margin-top: 4px; }
    #statusViz .carousel-indicators { margin: 8px 0 0; }
  }
</style>
</head>
<body>
<script type="module" src="../js/auth-bar.js"></script>
<mundial-auth-bar></mundial-auth-bar>

<div id="main-content" class="container-xxl">
  <div class="chart-card taxonomy">
    <div id="metricToggle" class="metric-toggle">
      <button type="button" data-metric="imp">Plays for</button>
      <button type="button" data-metric="exp">Born in</button>
    </div>
    <div id="statusViz">
      <div id="statusCarousel" class="carousel slide">
        <div class="carousel-inner" id="statusCarouselInner"></div>
        <button type="button" class="carousel-control-prev" data-bs-target="#statusCarousel" data-bs-slide="prev" aria-label="Previous">
          <svg class="viz-control-prev-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M11 13.5L5.5 8L11 2.5" stroke="#000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button type="button" class="carousel-control-next" data-bs-target="#statusCarousel" data-bs-slide="next" aria-label="Next">
          <svg class="viz-control-next-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M5 2.5L10.5 8L5 13.5" stroke="#000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="carousel-indicators" id="statusCarouselIndicators"></div>
      </div>
      <div class="stage-wrap" id="stageWrap"></div>
    </div>
    <div id="debugControls" class="d-flex justify-content-start flex-wrap mb-3">
      <label class="debug-label" for="speedSlider">Speed</label>
      <input type="range" id="speedSlider" min="0.1" max="4" step="0.05" value="0.1">
      <div style="white-space: nowrap;">
        <button type="button" id="stepBack">← Prev team</button>
        <button type="button" id="stepForward">Next team →</button>
      </div>
      <div class="form-check form-switch">
        <input class="form-check-input" type="checkbox" role="switch" id="squeezeSwitch" checked>
        <label class="form-check-label" for="squeezeSwitch">Squeeze</label>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { html, render } from 'https://cdn.jsdelivr.net/npm/lit-html@3/lit-html.js';
import { loadEloData, buildImportByCountry, buildEloItems, QUALIFIED_BY_NAME } from '../js/qualified.js';
import { pillClasses, pillContent } from '../js/elo_ranking.js';
import { countryName } from '../js/i18n.js';

const [{ eloData, statusByIso2 }, mapData] = await Promise.all([
  loadEloData('../'),
  fetch('../data/v2/map.json').then(r => r.json()),
]);

// The one parameter this whole chart is built around: which per-team count drives
// sort order, bar color, and the metric-flavored strings below. Selected via
// ?metric=exp in the URL (default: imports — the flavor this chart shipped with
// first), matching the ?stage= convention on the main map page. #metricToggle below
// switches METRIC in place (see applyMetric() further down) and mirrors the choice
// back into the URL via history.replaceState, so a reload or share link still lands
// on the same flavor without the toggle itself causing one. Colors reuse the exact
// same red/blue used everywhere else in the app for imported/exported (js/
// qualified.js's _IMP_LIGHT/_IMP_DARK/_EXP_LIGHT/_EXP_DARK, css/taxonomy.css's
// --imp-accent/--exp-accent).
const METRIC_CONFIGS = {
  imp: {
    countKey: 'impCount',
    light: [0xfb, 0xc9, 0xc9], dark: [0xef, 0x44, 0x44],
    rankedBy: 'players born in another country', pageTitle: 'Plays for another country',
  },
  exp: {
    countKey: 'bornCount',
    light: [0xbc, 0xd7, 0xfb], dark: [0x3b, 0x82, 0xf6],
    rankedBy: 'players born in this country', pageTitle: 'Born in this country',
  },
};
let METRIC = new URLSearchParams(location.search).get('metric') === 'exp' ? 'exp' : 'imp';
let METRIC_CONFIG = METRIC_CONFIGS[METRIC];
document.title = `${METRIC_CONFIG.pageTitle} — elimination status`;

document.querySelectorAll('#metricToggle button').forEach(btn => {
  const isActive = btn.dataset.metric === METRIC;
  btn.classList.toggle('active', isActive);
  btn.disabled = isActive;
  btn.addEventListener('click', () => applyMetric(btn.dataset.metric));
});

const importByCountry = buildImportByCountry(mapData, countryName);
// byId keyed by country id -> its export record ({ count, players, ... } from
// map.json's `data` array) — mirrors wc2026_map.js's buildIndices(). Needed so
// buildEloItems can compute expCount (byId[id]?.count); the imports flavor doesn't
// touch byId at all (importByCountry alone drives impCount), but the exports flavor
// depends on this being populated rather than {}.
const byId = Object.fromEntries(mapData.data.map(d => [d.id, d]));
// name -> id, for mapData.natives below (keyed by country name, same as wc2026_map.js's
// buildIndices()). Players born in a country who play for that same country — buildEloItems'
// own expCount (byId[id]?.count) counts strictly true exports (born-here-play-elsewhere),
// which is what drives dim-mode/tooltip logic on the map page, so it's left untouched here.
const nativeByCountry = {};
Object.entries(mapData.natives ?? {}).forEach(([name, players]) => {
  const nId = QUALIFIED_BY_NAME[name];
  if (nId != null) nativeByCountry[nId] = players;
});
const items = buildEloItems({
  rankings: eloData.rankings, byId, importByCountry, nativeByCountry, countryNameFn: countryName, statusByIso2,
}).filter(item => item.qualified);
// This chart's "exports" flavor means every player born in a country, whatever country
// they represent at the tournament — not just the ones who left. bornCount = true exports
// + native-born players still playing for their birth country.
items.forEach(item => {
  item.bornCount = item.expCount + (nativeByCountry[item.id]?.length ?? 0);
});

// Approximate Group Stage elimination dates + notes — status.json has no exact date
// for these (round-robin, no single fixture decides them), so this is manually
// researched rather than pipeline data. Kept as structured data (not just an order)
// so the dates/notes are available if this chart ever wants to display them, e.g. in
// a tooltip. The four 3rd-in-group dates are the fuzziest (depended on other groups'
// late results — see caveats in the research this was drawn from); Uruguay's
// "2026-06-26–27" range uses the effective date (final whistle of the deciding
// group), not the later formal confirmation once the third-place table closed.
// Sources: sports.yahoo.com/articles/teams-world-cup-2026-updated-153950826.html,
// blog.wego.com/world-cup-eliminated-team, espn.com/soccer (2026 WC elimination
// story), en.wikipedia.org/wiki/2026_FIFA_World_Cup.
const GROUP_STAGE_ELIMINATION = {
  ht:       { date: '2026-06-20', note: 'after MD2 loss to Brazil' },
  tr:       { date: '2026-06-20', note: 'after MD2 loss to Paraguay, ~2.5h after Haiti' },
  tn:       { date: '2026-06-21', note: 'after MD2 loss to Japan' },
  jo:       { date: '2026-06-22', note: 'after MD2 loss to Algeria' },
  cz:       { date: '2026-06-24', note: '4th in A, final whistle MD3' },
  qa:       { date: '2026-06-24', note: '4th in B, final whistle MD3' },
  cw:       { date: '2026-06-25', note: '4th in E' },
  nz:       { date: '2026-06-26', note: '4th in G' },
  sa:       { date: '2026-06-26', note: '4th in H' },
  iq:       { date: '2026-06-26', note: '4th in I' },
  uz:       { date: '2026-06-27', note: '4th in K' },
  pa:       { date: '2026-06-27', note: '4th in L' },
  uy:       { date: '2026-06-26', note: '3rd in H, 2 pts — effectively out at final whistle Jun 26, formally when third-place table closed' },
  kr:       { date: '2026-06-27', note: "3rd in A, 3 pts — depended on other groups' thirds" },
  'gb-sct': { date: '2026-06-27', note: '3rd in C, 3 pts — same situation' },
  ir:       { date: '2026-06-27', note: '3rd in G, 3 pts — out once Algeria–Austria drew' },
};

// Vanish order for the animation, earliest first: the four MD2 losers that were out
// early, then the eight 4th-in-group teams mathematically dead by MD3's final
// whistle, then the four 3rd-in-group teams (order here follows the research above,
// not a strict date sort — Uruguay's effective Jun 26 would otherwise place it
// before Uzbekistan/Panama, but it's grouped with its fellow 3rd-placed teams since
// all four's exact ordering among themselves is the fuzziest part of this data).
// Consumed as a fallback tier in applyState()'s vanish-order sort, below.
const GROUP_STAGE_ORDER = [
  'ht', 'tr', 'tn', 'jo', 'cz', 'qa', 'cw', 'nz',
  'sa', 'iq', 'uz', 'pa', 'uy', 'kr', 'gb-sct', 'ir',
];

// Best known elimination date for a team — real (Round of 32+) or, failing that,
// the manually researched Group Stage approximation above. null for teams this
// chart never eliminates (survive past Round of 32 in all 3 states). Not currently
// called anywhere — the elimination animation no longer displays a date (see
// animateRow) — kept as the resolver for GROUP_STAGE_ELIMINATION's data in case a
// future date display comes back.
const eliminationDateFor = item => item.eliminatedDate ?? GROUP_STAGE_ELIMINATION[item.iso2]?.date ?? null;

// Fixed row order — never changes between states, only each row's alive/eliminated
// status does. (An earlier version removed eliminated rows and re-flowed the rest;
// fixed rows + a status color is clearer since the total team count stays visible.)
// countKey/sorted/DOMAIN_MAX are `let`, not `const` — applyMetric() reassigns all
// three when the toggle flips flavors. itemByName is a Map of the same [name, item]
// pairs regardless of sort order, so it never needs rebuilding.
let countKey = METRIC_CONFIG.countKey;
let sorted = [...items].sort((a, b) => a[countKey] - b[countKey] || a.name.localeCompare(b.name));
const itemByName = new Map(sorted.map(i => [i.name, i]));

let maxCount = Math.max(0, ...sorted.map(i => i[countKey]));
let DOMAIN_MAX = Math.max(5, Math.ceil(maxCount / 5) * 5);

// Sequential gradient, darker/richer as the active metric's count rises. Colors
// switch with METRIC_CONFIG (red for imports, blue for exports) — same pair used
// everywhere else in the app (js/qualified.js's _IMP_LIGHT/_IMP_DARK/_EXP_LIGHT/
// _EXP_DARK, css/taxonomy.css's --imp-accent/--exp-accent).
function lerpColor(lo, hi, t) {
  const c = lo.map((v, i) => Math.round(v + (hi[i] - v) * t));
  return '#' + c.map(v => v.toString(16).padStart(2, '0')).join('');
}
function gradientFor(value) {
  const t = Math.max(0, Math.min(1, value / DOMAIN_MAX));
  return lerpColor(METRIC_CONFIG.light, METRIC_CONFIG.dark, t);
}

// Three real boundaries, no invented scenario: everyone qualified, then whoever
// hasn't been eliminated as of the Group Stage cutoff, then as of the Round of
// 32 cutoff. A team not (yet) eliminated always counts as "in it" — including
// one currently mid-fixture — rather than guessing how an undecided match ends.
const aliveAfter = roundIdx =>
  new Set(sorted.filter(i => i.eliminatedAtIndex == null || i.eliminatedAtIndex >= roundIdx).map(i => i.name));

const allNames = new Set(sorted.map(i => i.name));
const afterGroupStage = aliveAfter(1);
const afterRoundOf32 = aliveAfter(2);
const afterRoundOf16 = aliveAfter(3);
const afterQuerterFinals = aliveAfter(4);
const afterSemiFinals = aliveAfter(5);
// roundIdx 6 has no ELIM_ROUNDS entry (max index is 5, 'Final') — aliveAfter(6) only
// keeps teams with eliminatedAtIndex == null, i.e. whoever never lost. In practice
// that's exactly the champion, mirroring CAROUSEL_STAGES' own trailing 'winner'
// stage on the main map page.
const afterFinal = aliveAfter(6);
const championItem = sorted.find(i => afterFinal.has(i.name));

const outAtGroupStage = allNames.size - afterGroupStage.size;
const outAtRoundOf32 = afterGroupStage.size - afterRoundOf32.size;

// liveSubtitle, where present, re-renders the subtitle from a live running count as
// applyState()'s row cascade proceeds (one step per team vanishing or reappearing),
// converging on the exact same text as the static `subtitle` once the cascade
// finishes — so "48 teams remain" counts down to "47", "46"... in step with each
// row's own animation instead of jumping straight to the final number the instant
// the carousel slide starts. State 0's subtitle carries no count, so no template.
const STATES = [
  {
    alive: allNames,
    title: `Group stage: ${allNames.size} qualified countries`,
    subtitle: `ranked by ${METRIC_CONFIG.rankedBy}.`,
  },
  {
    alive: afterGroupStage,
    title: `Round of 32`,
    subtitle: `16 eliminated in the Group Stage - 32 teams remain.`,
    
    liveSubtitle: count => `${allNames.size-count} eliminated in the Group Stage - ${count} teams remain.`,
  },
  {
    alive: afterRoundOf32,
    title: `Round of 16`,
    subtitle: `16 eliminated in the Round of 32 - 16 teams remain.`,
    liveSubtitle: count => `${allNames.size-outAtRoundOf32-count} eliminated in the Round of 32 - ${count} teams remain.`,
  },
  {
    alive: afterRoundOf16,
    title: `Querter-Finals`,
    subtitle: `${afterRoundOf32.size-afterRoundOf16.size} eliminated in the Round of 16 - ${afterRoundOf16.size} teams remain.`,
    liveSubtitle: count => `${afterRoundOf32.size-count} eliminated in the Round of 16 - ${count} teams remain.`,
  },
  {
    alive: afterQuerterFinals,
    title: `Semi finals`,
    subtitle: `${afterRoundOf16.size-afterQuerterFinals.size} eliminated in the Querter-Finals - ${afterQuerterFinals.size} teams remain.`,
    liveSubtitle: count => `${afterRoundOf16.size-count} eliminated in the Querter-Finals - ${count} teams remain.`,
  },
  {
    alive: afterSemiFinals,
    title: `Final`,
    subtitle: `${afterQuerterFinals.size-afterSemiFinals.size} eliminated in the Semi-finals - ${afterSemiFinals.size} teams remain.`,
    liveSubtitle: count => `${afterQuerterFinals.size-count} eliminated in the Semi-finals - ${count} teams remain.`,
  },
  {
    alive: afterFinal,
    title: championItem ? `${championItem.name} wins the World Cup` : 'Champion',
    subtitle: `${afterSemiFinals.size-afterFinal.size} eliminated in the Final - ${afterFinal.size} team${afterFinal.size === 1 ? '' : 's'} remain${afterFinal.size === 1 ? 's' : ''}.`,
    liveSubtitle: count => `${afterSemiFinals.size-count} eliminated in the Final - ${count} team${count === 1 ? '' : 's'} remain${count === 1 ? 's' : ''}.`,
  },
];

// ── build the row list once — only colors/positions change between states ──
const stageWrap = document.getElementById('stageWrap');

// Std lines are created once and reused — like the mean line, they need to stay the
// *same* element across states for their `left` transition to animate. Recreating them
// fresh each time (as an innerHTML rebuild would) leaves nothing for the browser to
// transition from, so they'd just teleport into position instead of sliding.
const sdOverlay = document.createElement('div');
sdOverlay.className = 'mean-overlay';
sdOverlay.innerHTML = '<div class="anim-value"></div><div class="mean-col"></div>';
const sdCol = sdOverlay.querySelector('.mean-col');
stageWrap.appendChild(sdOverlay);

const SD_MULTIPLES = [-3, -2, -1, 1, 2, 3];
const sdEls = new Map(SD_MULTIPLES.map(k => {
  const line = document.createElement('div');
  line.className = 'sd-line';
  const label = document.createElement('div');
  label.className = 'sd-label';
  label.textContent = (k > 0 ? '+' : '−') + (Math.abs(k) === 1 ? 'std' : Math.abs(k) + ' std');
  sdCol.append(line, label);
  return [k, { line, label }];
}));

const meanOverlay = document.createElement('div');
meanOverlay.className = 'mean-overlay';
meanOverlay.innerHTML = '<div class="anim-value"></div><div class="mean-col"><div class="mean-line"></div><div class="mean-label"></div></div>';
const meanLineEl = meanOverlay.querySelector('.mean-line');
const meanLabelEl = meanOverlay.querySelector('.mean-label');
stageWrap.appendChild(meanOverlay);

// Country pills — same component used across the app (elo_ranking.js's pillClasses/
// pillContent): real flag + qualified border. exp/imp are left off (no arrows, no
// count-gradient background) since this chart's bar color already encodes the
// active metric's count and elimination status; a second count-driven encoding on
// the pill itself would just repeat the same signal in a different color.
const MIN_GAP_PX = 6; // must match .anim-tail's `+ 6px` in CSS
const stage = document.createElement('div');
stage.className = 'anim-stage';
const rowEls = new Map();
sorted.forEach((item, index) => {
  const { name } = item;
  const count = item[countKey];
  const row = document.createElement('div');
  row.className = 'anim-row';

  // Leftmost, fixed-width column — the only part of the row that's NOT inside
  // .anim-track, so the track's own rendered width (and hence what "pct" is
  // relative to) stays identical across every row regardless of digit count.
  const val = document.createElement('span');
  val.className = 'anim-value';
  val.textContent = count;
  row.appendChild(val);

  // A row's own color/width never change between states (the metric's count is
  // fixed per team) — only alive/eliminated does. Set once here rather than
  // recomputed on every applyState() call.
  const pct = count === 0 ? 0 : count / DOMAIN_MAX * 100;
  const track = document.createElement('span');
  track.className = 'anim-track';
  const fill = document.createElement('span');
  fill.className = 'anim-fill';
  fill.style.width = pct === 0 ? '0' : pct + '%';
  if (pct === 0) fill.style.minWidth = '0';
  fill.style.setProperty('--fill-light', gradientFor(count));
  track.appendChild(fill);

  // Name + flag, positioned just after the bar's own end (--pct drives both `left`
  // and `max-width` via calc, so it never overflows the track — see refreshTail
  // OverflowMode() below for the bottom-of-list case where there isn't room).
  const tail = document.createElement('span');
  tail.className = 'anim-tail';
  tail.style.setProperty('--pct', pct + '%');
  tail.dataset.pct = pct;

  const pill = document.createElement('span');
  pill.className = pillClasses({ qualified: true, fifaMember: item.fifaMember, knockedOut: item.knockedOut, noMap: item.noMap });
  render(pillContent({ iso2: item.iso2, name: item.name, pts: null }), pill);
  tail.appendChild(pill);
  track.appendChild(tail);
  row.appendChild(track);

  stage.appendChild(row);
  // val/fill are kept here (not just tail/pill) so applyMetric() can update the
  // displayed count and bar width/color in place when the flavor switches.
  rowEls.set(name, { row, val, fill, tail, pill, index });
});
stageWrap.appendChild(stage);

// Decides, per row, whether .anim-tail (name+flag) fits in the space left after the
// bar (default mode) or needs to flip to .anim-tail--overflow (right-aligned,
// spilling left over the bar) instead — see the .anim-tail CSS comment above.
// Re-run on resize since it depends on the track's live rendered width, not just data.
function refreshTailOverflowMode() {
  rowEls.forEach(({ tail, pill }) => {
    const track = tail.parentElement;
    const trackWidth = track.getBoundingClientRect().width;
    if (trackWidth === 0) return;

    // Reset to default mode and momentarily lift .anim-tail's own max-width
    // constraint before measuring: with the constraint still applied, flexbox has
    // already shrunk/ellipsized the pill down to fit whatever space default mode
    // allows, so its rendered width would tautologically never exceed that same
    // space — comparing a value against the constraint that produced it can never
    // trip the check. getBoundingClientRect() forces the reflow needed to read the
    // *true* unconstrained width; restoring maxWidth right after means this never
    // actually paints.
    tail.classList.remove('anim-tail--overflow');
    const prevMaxWidth = tail.style.maxWidth;
    tail.style.maxWidth = 'none';
    const neededPx = pill.getBoundingClientRect().width;
    tail.style.maxWidth = prevMaxWidth;

    const pct = parseFloat(tail.dataset.pct) || 0;
    const availablePx = trackWidth * (1 - pct / 100) - MIN_GAP_PX;
    tail.classList.toggle('anim-tail--overflow', neededPx > availablePx);
  });
}
requestAnimationFrame(refreshTailOverflowMode);
window.addEventListener('resize', refreshTailOverflowMode);

// Rows change one at a time, strictly chained — a row's own animation only starts
// once the previous row's has fully finished. Elimination is nothing but the whole
// row (count, bar, flag, name together) sliding left until .anim-stage's own
// overflow:hidden clips it away, leaving an empty slot in the list — no color
// change, no collapsing, always exactly 48 rows in flow. Reappearing is the exact
// reverse (same transform, same duration, browser interpolates back from wherever
// the row currently sits) — no asymmetric handling needed.
const ROW_SLIDE_MS = 500;

// Debug-only speed multiplier (#speedSlider, no label by design) — scales
// ROW_SLIDE_MS in animateRow() below, and (via the --speed custom property) the
// mean/std lines' own CSS transition-duration.
const speedSlider = document.getElementById('speedSlider');
let SPEED = parseFloat(speedSlider.value);
document.documentElement.style.setProperty('--speed', SPEED);
speedSlider.addEventListener('input', () => {
  SPEED = parseFloat(speedSlider.value);
  document.documentElement.style.setProperty('--speed', SPEED);
});

// Debug-only "Squeeze" switch (#squeezeSwitch) — when on, eliminated (.is-out) rows
// collapse (display:none) instead of just sliding off-screen and leaving a blank
// slot. setRowSqueezed is called at animation boundaries, not mid-slide: display is
// only cleared right before a reappearing row starts sliding back in (a display:none
// row has nothing to animate), and only set to none once a vanishing row's slide-out
// transition has fully resolved. Toggling the switch itself re-syncs every row
// immediately, no animation involved.
const squeezeSwitch = document.getElementById('squeezeSwitch');
let SQUEEZE = squeezeSwitch.checked;
function setRowSqueezed(row, squeezed) {
  row.style.display = squeezed ? 'none' : '';
  // Reveal only: force a reflow so the browser locks in this "still translated out"
  // frame before animateRow's very next synchronous line changes `transform` — without
  // it, display:none→'' and the transform change land in the same style recalculation,
  // the transition never actually runs, and transitionend (which animateRow awaits)
  // never fires, hanging the whole cascade forever.
  if (!squeezed) void row.offsetHeight;
}
squeezeSwitch.addEventListener('change', () => {
  SQUEEZE = squeezeSwitch.checked;
  rowEls.forEach(({ row }) => setRowSqueezed(row, SQUEEZE && row.classList.contains('is-out')));
});

// Resolves once `el`'s `cssProp` transition genuinely ends — chaining on the real
// event instead of a precomputed setTimeout means nothing can drift out of sync
// with however long the browser actually took.
function transitionEnd(el, cssProp) {
  return new Promise(resolve => {
    el.addEventListener('transitionend', function handler(e) {
      if (e.propertyName !== cssProp) return;
      el.removeEventListener('transitionend', handler);
      resolve();
    });
  });
}

// Slides one row fully out to the left (or back in, reversed) — see .anim-row and
// .anim-stage above. Returns the elapsed ms (at the live SPEED value used), so
// callers can size the mean/std line's own transition to match.
async function animateRow(name, isOut) {
  const { row } = rowEls.get(name);
  const ms = ROW_SLIDE_MS * SPEED;
  row.style.transitionDuration = ms + 'ms';
  row.style.transform = isOut ? 'translateX(-100%)' : 'translateX(0)';
  await transitionEnd(row, 'transform');
  return ms;
}

// ── ±1/2/3 std + mean line position for a given alive-set, no DOM writes ──
function computeStats(aliveSet) {
  const aliveValues = sorted.filter(i => aliveSet.has(i.name)).map(i => i[countKey]);
  const mean = aliveValues.length ? aliveValues.reduce((a, b) => a + b, 0) / aliveValues.length : 0;
  const variance = aliveValues.length ? aliveValues.reduce((a, b) => a + (b - mean) ** 2, 0) / aliveValues.length : 0;
  return { mean, sd: Math.sqrt(variance) };
}

const overlayEls = [meanLineEl, meanLabelEl, ...[...sdEls.values()].flatMap(({ line, label }) => [line, label])];

// ── paint the mean/std lines for a given stats snapshot ──
// durationMs overrides the CSS default (0.9s * --speed): applyState()'s chain
// retargets `left` once per row, right as that row's animateRow() resolves, and
// passes its actual elapsed duration here — keeping the line's own transition in
// step with the retargets instead of being interrupted mid-flight by a longer,
// mismatched default duration.
function paintLines({ mean, sd }, durationMs = null) {
  const pct = Math.max(0, Math.min(100, mean / DOMAIN_MAX * 100));
  overlayEls.forEach(el => { el.style.transitionDuration = durationMs == null ? '' : durationMs + 'ms'; });

  // ±1/2/3 std reference lines — only visible when they fall within the chart's domain
  // (a count can't go negative, so -2/-3 std are routinely off the left edge). Position
  // is still updated even while hidden, so a line that re-enters the domain later slides
  // in from where it conceptually sits rather than popping in at a random spot.
  sdEls.forEach(({ line, label }, k) => {
    const v = mean + k * sd;
    const p = sd > 0 ? v / DOMAIN_MAX * 100 : (k < 0 ? 0 : 100);
    const visible = sd > 0 && v >= 0 && v <= DOMAIN_MAX;
    line.style.left = p + '%';
    label.style.left = p + '%';
    line.style.opacity = visible ? '1' : '0';
    label.style.opacity = visible ? '1' : '0';
  });
  meanLineEl.style.left = pct + '%';
  meanLabelEl.style.left = pct + '%';
  meanLabelEl.textContent = 'mean';
  return overlayEls;
}

// Vanishing order follows real elimination chronology where we have it: Round of 32
// onward is a single deciding fixture per team, dated in status.json. Group Stage
// exits have no such date (round-robin — no single fixture decided them) —
// GROUP_STAGE_ORDER is a manually researched approximation of the same idea
// (mathematical-elimination date, or presentation order for the fuzzier
// third-placed-team cases) rather than pipeline data, so it's checked after real
// dates and before the chart's fixed row order (the last-resort fallback for anyone
// in neither). Round always outranks date/manual order (earlier rounds vanish first
// regardless). Shared by applyState() (only the rows changing this transition) and
// GLOBAL_VANISH_ORDER below (every team this chart ever eliminates, in one sequence).
function vanishOrderCompare(ia, ib) {
  const roundA = ia.eliminatedAtIndex ?? Infinity, roundB = ib.eliminatedAtIndex ?? Infinity;
  if (roundA !== roundB) return roundA - roundB;
  const dateA = ia.eliminatedDate ? Date.parse(ia.eliminatedDate) : null;
  const dateB = ib.eliminatedDate ? Date.parse(ib.eliminatedDate) : null;
  if (dateA != null && dateB != null && dateA !== dateB) return dateA - dateB;
  const gsA = GROUP_STAGE_ORDER.indexOf(ia.iso2), gsB = GROUP_STAGE_ORDER.indexOf(ib.iso2);
  if (gsA !== -1 && gsB !== -1) return gsA - gsB;
  return rowEls.get(ia.name).index - rowEls.get(ib.name).index;
}

// Every team this chart ever eliminates (Group Stage + Round of 32), in vanish
// order — the full timeline #stepBack/#stepForward below scrub through, one team
// per click, independent of the carousel's own (coarser, per-stage) navigation.
// `let`, not `const` — applyMetric() recomputes this since vanishOrderCompare's
// last-resort tiebreak reads each row's `index`, which changes with the sort.
let GLOBAL_VANISH_ORDER = sorted.filter(i => i.eliminatedAtIndex != null).sort(vanishOrderCompare);

// ── switch sort/color/text flavor in place — no reload. Row DOM nodes are reused
// (reordered via appendChild, which moves rather than clones) so eliminated rows
// keep their existing .is-out state and transform untouched; only each row's own
// count/width/color and its position in the list change. Ignored mid-cascade (see
// applyState()) since that's already mutating rowEls' is-out state concurrently. ──
function applyMetric(newMetric) {
  if (newMetric === METRIC || animating) return;
  METRIC = newMetric;
  METRIC_CONFIG = METRIC_CONFIGS[METRIC];
  countKey = METRIC_CONFIG.countKey;

  sorted = [...items].sort((a, b) => a[countKey] - b[countKey] || a.name.localeCompare(b.name));
  maxCount = Math.max(0, ...sorted.map(i => i[countKey]));
  DOMAIN_MAX = Math.max(5, Math.ceil(maxCount / 5) * 5);

  sorted.forEach((item, index) => {
    const entry = rowEls.get(item.name);
    entry.index = index;
    const count = item[countKey];
    entry.val.textContent = count;
    const pct = count === 0 ? 0 : count / DOMAIN_MAX * 100;
    entry.fill.style.width = pct === 0 ? '0' : pct + '%';
    entry.fill.style.minWidth = pct === 0 ? '0' : '';
    entry.fill.style.setProperty('--fill-light', gradientFor(count));
    entry.tail.style.setProperty('--pct', pct + '%');
    entry.tail.dataset.pct = pct;
    stage.appendChild(entry.row); // re-sorts the visual order — appendChild moves, doesn't clone
  });
  refreshTailOverflowMode();

  GLOBAL_VANISH_ORDER = sorted.filter(i => i.eliminatedAtIndex != null).sort(vanishOrderCompare);

  STATES[0].subtitle = `ranked by ${METRIC_CONFIG.rankedBy}.`;
  subtitleEls[0].textContent = STATES[0].subtitle;
  document.title = `${METRIC_CONFIG.pageTitle} — elimination status`;

  document.querySelectorAll('#metricToggle button').forEach(btn => {
    const isActive = btn.dataset.metric === METRIC;
    btn.classList.toggle('active', isActive);
    btn.disabled = isActive;
  });

  const params = new URLSearchParams(location.search);
  if (METRIC === 'imp') params.delete('metric'); else params.set('metric', 'exp');
  const qs = params.toString();
  history.replaceState(null, '', location.pathname + (qs ? '?' + qs : ''));

  const currentAlive = new Set();
  rowEls.forEach(({ row }, name) => { if (!row.classList.contains('is-out')) currentAlive.add(name); });
  paintLines(computeStats(currentAlive));
}

// ── apply one state's alive/eliminated status + mean/std lines in place ────
function applyState(idx, instant) {
  const state = STATES[idx];

  // Snapshot the alive-ness the DOM currently shows, before any row gets toggled
  // below — this is the starting point for the stepwise walk further down.
  const currentAlive = new Set();
  rowEls.forEach(({ row }, name) => { if (!row.classList.contains('is-out')) currentAlive.add(name); });

  const changed = [];
  rowEls.forEach(({ row }, name) => {
    const isOut = !state.alive.has(name);
    if (row.classList.contains('is-out') !== isOut) changed.push({ name, isOut });
  });

  if (instant || changed.length === 0) {
    rowEls.forEach(({ row }, name) => {
      const isOut = !state.alive.has(name);
      row.classList.toggle('is-out', isOut);
      setRowSqueezed(row, SQUEEZE && isOut);
    });
    const allEls = paintLines(computeStats(state.alive));
    if (instant) {
      allEls.forEach(el => { el.style.transition = 'none'; });
      requestAnimationFrame(() => { allEls.forEach(el => { el.style.transition = ''; }); });
    }
    setNavDisabled(false);
    return;
  }

  // Reappearing (moving backward) undoes in the exact reverse of whatever order the
  // teams vanished in.
  changed.sort((a, b) => vanishOrderCompare(itemByName.get(a.name), itemByName.get(b.name)));
  if (!changed[0].isOut) changed.reverse();

  // Strictly chained: each row's animateRow() call only starts once the previous
  // row's has fully resolved (awaited real transitionend events, not a precomputed
  // delay). The mean/std line update per row is fire-and-forget — it doesn't block
  // the next row from starting, only reads the just-finished row's own duration so
  // its own transition is sized to match instead of a hardcoded guess. The
  // destination slide's subtitle count (where a liveSubtitle template exists — see
  // STATES above) updates on the same per-row cadence, converging on the exact
  // static text once the cascade settles.
  animating = true;
  setNavDisabled(true);
  (async () => {
    const runningAlive = new Set(currentAlive);
    for (const { name, isOut } of changed) {
      const { row } = rowEls.get(name);
      row.classList.toggle('is-out', isOut);
      if (!isOut) setRowSqueezed(row, false); // reveal before sliding back in
      const durationMs = await animateRow(name, isOut);
      if (isOut) setRowSqueezed(row, SQUEEZE); // hide once fully vanished
      if (isOut) runningAlive.delete(name); else runningAlive.add(name);
      paintLines(computeStats(runningAlive), durationMs);
      if (state.liveSubtitle) subtitleEls[idx].textContent = state.liveSubtitle(runningAlive.size);
    }
    subtitleEls[idx].textContent = state.subtitle;
    animating = false;
    setNavDisabled(false);
  })();
}

// ── debug: manual team-by-team stepper, independent of the carousel — lets the eye
// verify the vanish order one deliberate step at a time instead of racing a timer,
// however slow. Always derives "what's next" from the DOM's current state (not a
// persisted cursor), so it stays correct even if the carousel changed things since
// the last click. ──
function stepTeam(forward) {
  const isOutNow = name => rowEls.get(name).row.classList.contains('is-out');
  const target = forward
    ? GLOBAL_VANISH_ORDER.find(item => !isOutNow(item.name))
    : [...GLOBAL_VANISH_ORDER].reverse().find(item => isOutNow(item.name));
  if (!target) return;

  const { row } = rowEls.get(target.name);
  row.classList.toggle('is-out', forward);
  if (!forward) setRowSqueezed(row, false); // reveal before sliding back in

  animateRow(target.name, forward).then(() => {
    if (forward) setRowSqueezed(row, SQUEEZE); // hide once fully vanished
    const alive = new Set(sorted.filter(i => !isOutNow(i.name)).map(i => i.name));
    paintLines(computeStats(alive));
  });
}
document.getElementById('stepBack').addEventListener('click', () => stepTeam(false));
document.getElementById('stepForward').addEventListener('click', () => stepTeam(true));

// ── navigation: a real Bootstrap carousel owns the index (controls, indicators,
// swipe, keyboard — all native). Its carousel-items only carry each state's caption
// text; the actual visualization is the single persistent #stageWrap built above,
// which keeps morphing in place via applyState() exactly as before — just triggered
// by the carousel's own 'slide.bs.carousel' event instead of a custom click handler. ──
const carouselEl = document.getElementById('statusCarousel');
const carouselInner = document.getElementById('statusCarouselInner');
const indicatorsEl = document.getElementById('statusCarouselIndicators');

// Referenced by applyState()'s cascade to (a) live-update the destination slide's
// subtitle count in step with each row (subtitleEls) and (b) lock out navigation
// entirely while a cascade is running (indicatorDots, alongside prevBtn/nextBtn).
const subtitleEls = [];
const indicatorDots = [];
STATES.forEach((state, i) => {
  const item = document.createElement('div');
  item.className = 'carousel-item' + (i === 0 ? ' active' : '');
  item.innerHTML = '<div class="stage-caption"><div class="stage-title"></div><div class="stage-subtitle"></div></div>';
  item.querySelector('.stage-title').textContent = state.title;
  const subtitleEl = item.querySelector('.stage-subtitle');
  subtitleEl.textContent = state.subtitle;
  subtitleEls.push(subtitleEl);
  carouselInner.appendChild(item);

  const dot = document.createElement('button');
  dot.type = 'button';
  dot.setAttribute('data-bs-target', '#statusCarousel');
  dot.setAttribute('data-bs-slide-to', String(i));
  dot.setAttribute('aria-label', state.title);
  if (i === 0) { dot.classList.add('active'); dot.setAttribute('aria-current', 'true'); }
  indicatorDots.push(dot);
  indicatorsEl.appendChild(dot);
});

const prevBtn = carouselEl.querySelector('.carousel-control-prev');
const nextBtn = carouselEl.querySelector('.carousel-control-next');
new bootstrap.Carousel(carouselEl, { interval: false, wrap: false });

// Locked out entirely while a row cascade is running (see applyState()) — not
// just visually disabled: the slide.bs.carousel guard below rejects the slide
// outright regardless of what triggered it (click, keyboard, swipe), the same
// preventDefault idiom js/control_sidebar.js uses for the main map's own stage
// carousel. Buttons/dots are ALSO disabled as a visual affordance, but that guard
// is the actual enforcement.
let animating = false;
let currentIdx = 0;
function setNavDisabled(disabled) {
  prevBtn.disabled = disabled || currentIdx === 0;
  nextBtn.disabled = disabled || currentIdx === STATES.length - 1;
  indicatorDots.forEach(dot => { dot.disabled = disabled; });
}

carouselEl.addEventListener('slide.bs.carousel', e => {
  if (animating) { e.preventDefault(); return; }
  currentIdx = e.to;
  applyState(e.to);
});

applyState(0, true);
setNavDisabled(false);
</script>
</body>
</html>
