<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countries · Mundial 2026</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="css/wc2026_map.css">
<link rel="stylesheet" href="css/taxonomy.css">
<link rel="stylesheet" href="css/control-sidebar.css">
</head>
<body>
<script type="module" src="js/auth-bar.js"></script>
<mundial-auth-bar></mundial-auth-bar>
<header id="countries-header">
  <div class="container d-flex flex-wrap justify-content-between align-items-start gap-3 py-3">
    <div>
      <h1 class="fs-5 fw-semibold mb-1">World Cup 2026 · Countries</h1>
      <p class="sub mb-0" id="elo-meta"></p>
    </div>
    <div id="sidebar-host"></div>
  </div>
</header>
<div id="main-content" class="container pb-5 taxonomy">
  <elo-ranking id="list"></elo-ranking>
</div>
<script type="module">
import './js/wc2026_elo_ranking.js';
import { QUALIFIED_BY_NAME, QUALIFIED_NAMES, buildEloItems } from './js/qualified.js';
import { LOCALE, T, countryName } from './js/i18n.js';
import { initSidebar } from './js/control_sidebar.js';

const _header = document.getElementById('countries-header');
const _main   = document.getElementById('main-content');
const _syncPaddingTop = () => { _main.style.paddingTop = _header.getBoundingClientRect().bottom + 'px'; };
requestAnimationFrame(_syncPaddingTop);
window.addEventListener('resize', _syncPaddingTop);

const [eloData, mapData] = await Promise.all([
  fetch('./data/wc2026_elo_rank.json').then(r => r.json()),
  fetch('./data/wc2026_map_data.json').then(r => r.json()),
]);

const byId = Object.fromEntries((mapData.data ?? []).map(d => [d.id, d]));
const fifaMemberIds = new Set(eloData.rankings.filter(r => r.fifaMember).map(r => r.id));
const importByCountry = {};
for (const [name, players] of Object.entries(mapData.natives ?? {})) {
  const id = QUALIFIED_BY_NAME[name];
  if (id != null) importByCountry[id] = players;
}

const app = { byId, importByCountry };
const fmtPop = n => new Intl.NumberFormat(LOCALE, { notation: 'compact', maximumFractionDigits: 1 }).format(n);

const allItems = buildEloItems({
  rankings: eloData.rankings,
  byId,
  importByCountry,
  fifaMemberIds,
  countryNameFn: countryName,
  pop: mapData.pop,
});

const el = document.getElementById('list');

const _sortFns = {
  elo:   (a, b) => (a.rank ?? 99999) - (b.rank ?? 99999),
  exp:   (a, b) => b.expCount - a.expCount,
  imp:   (a, b) => b.impCount - a.impCount,
  delta: (a, b) => (b.expCount - b.impCount) - (a.expCount - a.impCount) || (b.expCount + b.impCount) - (a.expCount + a.impCount),
  pop:   (a, b) => (b.pop ?? 0) - (a.pop ?? 0),
  alpha: (a, b) => a.name.localeCompare(b.name),
};
const _ptsFor = (key, item) =>
    key === 'exp'   ? item.expCount
  : key === 'imp'   ? item.impCount
  : key === 'delta' ? (item.impCount && item.expCount ? `${item.impCount} · ${item.expCount}` : item.impCount || item.expCount || null)
  : key === 'elo'   ? item.pts
  : key === 'pop'   ? (item.pop ? fmtPop(item.pop) : null)
  : null;

const sidebarCallbacks = {};
const sidebar = initSidebar({ T, QUALIFIED_NAMES, app, fifaMemberIds, eloMain: el, callbacks: sidebarCallbacks, alwaysOpen: true });

const renderElo = () => {
  const raw = [...allItems];
  raw.sort((a, b) => {
    for (let i = 0; i < Math.min(sidebar.sortOrder.length, 3); i++) {
      let d = _sortFns[sidebar.sortOrder[i]](a, b);
      if (i === 0 && sidebar.sortDir === 'asc') d = -d;
      if (d !== 0) return d;
    }
    return 0;
  });
  const primary   = sidebar.sortOrder[0];
  const secondary = sidebar.sortOrder[1];
  const visible = raw
    .filter(item => sidebar.catEloChecked(item.id, item.fifaMember))
    .map(item => ({
      ...item,
      pts:  primary === 'alpha' ? null : _ptsFor(primary, item),
      pts2: secondary ? _ptsFor(secondary, item) : null,
    }));
  el.show(visible);
  _syncPaddingTop();
};
sidebarCallbacks.renderElo = renderElo;

const metaEl = document.getElementById('elo-meta');
const parts = [];
if (eloData.source) parts.push(`<a href="https://${eloData.source}/" target="_blank" rel="noopener" class="sub">${eloData.source}</a>`);
if (eloData.updated) {
  const d = new Date(eloData.updated + 'T00:00:00');
  const fmt = isNaN(d) ? eloData.updated : d.toLocaleDateString(LOCALE, { day: 'numeric', month: 'long', year: 'numeric' });
  parts.push(`updated ${fmt}`);
}
metaEl.innerHTML = `${allItems.length} countries · ${parts.join(' · ')}`;

el.items = allItems;
renderElo();
</script>
</body>
</html>
