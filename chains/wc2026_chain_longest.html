<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chemin le plus long · Mondial 2026</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<link rel="stylesheet" href="../css/global.css">
<link rel="stylesheet" href="../css/map-container.css">
<!-- :root's --exp-accent/--imp-accent — map-container.js's arc-drawing (appendArc) reads
     these once at module-eval time for the arc/arrowhead colors, same tokens the main
     map's dim mode and the elo-ranking pills already share. -->
<link rel="stylesheet" href="../css/taxonomy.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f5f2ec; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
#container { width: 100%; }
/* Duplicated from css/wc2026_map.css (.legend-outlier-wrap/.legend-outlier-dot/
   #legend-outlier-count) rather than linking that whole stylesheet — it's the main
   map page's primary CSS file, full of #page-header/tooltip/dim/sidebar rules with
   global selectors (body, etc.) that don't apply here and could collide with this
   page's own simpler body layout above. See the duplication report (PR description)
   for the full accounting. --text-muted substituted for --color-dim, which isn't
   defined anywhere reachable on this page (nor, actually, on wc2026_map.html itself). */
.legend-outlier-wrap { height: 10px; }
.legend-outlier-dot { width: 10px; height: 10px; border-radius: 50%; background: #000; }
#legend-outlier-count, #legend-outlier-count-pos { font-size: 9px; color: var(--text-muted); margin-top: 3px; }
/* #chain-panel — moved here from wc2026_map.html (cut, not shared/duplicated), where it
   was one of #bottom-panel's collapsible .tab-footer-panel children, expanding only
   while the chain tab was active. Here it's the only footer on the page, so it's just
   its own always-visible position:fixed bar — no .tab-footer-panel/.collapsed max-height
   transition, no tab list to sit alongside. Styling mirrors #bottom-panel's own
   (css/wc2026_map.css) rather than linking that stylesheet wholesale (same reasoning as
   the legend-outlier rules just above). Holds wc2026_chain_render.js's own header
   (né en/joue pour legend + subtitle + prev/next nav buttons) via renderChain's
   headerContainer option — see the module script below. */
#chain-panel {
  position: fixed; bottom: 0; left: 0; right: 0;
  z-index: 100;
  background: var(--fixed-element-bg);
  border-top: 1px solid var(--border);
  padding: 4px var(--vert-gutter);
}
/* #chain-mode-toggle (fwd/bwd/both) — moved here from wc2026_map.js/css/wc2026_map.css
   (cut, not duplicated). Copied as its own small rule rather than linking
   css/wc2026_map.css wholesale, same reasoning as the legend-outlier rules above. */
.chain-mode-btn { border: 1px solid #dee2e6; border-radius: 16px; padding: 2px 12px; font-size: 11px; background: #fff; color: #888; cursor: pointer; transition: all .15s; }
.chain-mode-btn:hover { border-color: #999; }
.chain-mode-btn.active { background: #1C274C; color: #fff; border-color: #1C274C; }
</style>
</head>
<body>
<script type="module" src="../js/auth-bar.js"></script>
<mundial-auth-bar></mundial-auth-bar>
<!-- #map-container — same markup/CSS (css/map-container.css) as wc2026_map.html's own,
     so mundial-auth-bar's _offsetSibling() positions it below the 32px navbar the same
     way. See the second module script below for what's wired to it: a trimmed,
     tooltip/dim/sidebar-free choropleth (world + UK nations + qualified flags only). -->
<div id="map-container" class="flex-column container-xxl px-0 mt-0 position-relative">
  <button id="map-toggle-bar" type="button" class="map-toggle-bar" data-bs-toggle="collapse" data-bs-target="#map-collapse" aria-expanded="true" aria-controls="map-collapse">⌄</button>
  <div id="map-collapse" class="collapse show w-100">
  <div id="map-frame">
  <world-map id="map" role="img" aria-label="Choropleth map of players born in one country, playing for another"></world-map>
  <span id="zoom-hint"></span>
  </div>
  <div id="legend-parent" class="d-flex align-items-center justify-content-between w-100 pt-1">
    <img id="legend-grip" src="../images/grip-horizontal-svgrepo-com.svg" width="20" height="20" alt="" aria-hidden="true">
    <div id="map-controls" class="d-flex align-items-center gap-1">
      <button id="zoom-reset" type="button" aria-label="Reset zoom">
        <img src="../images/solar_linear/global-svgrepo-com.svg" width="20" height="20" aria-hidden="true">
      </button>
      <button id="zoom-span" type="button" aria-label="Span all visible countries">
        <img src="../images/solar_linear/maximize-square-2-svgrepo-com.svg" width="20" height="20" aria-hidden="true">
      </button>
      <button id="theme-toggle" type="button" aria-label="Switch map color theme" title="Switch map color theme"></button>
    </div>
    <div id="legend-born" class="sub">
      <span id="legend-born-full" class="d-none d-md-inline"></span>
      <span id="legend-born-brief" class="d-md-none"></span>
    </div>
    <div id="legend" class="d-flex align-items-start">
      <div class="d-flex flex-column pe-2">
        <div class="d-flex align-items-center justify-content-center legend-outlier-wrap">
          <div id="legend-outlier-dot" class="legend-outlier-dot"></div>
        </div>
        <div id="legend-outlier-count" class="text-center"></div>
      </div>
      <div>
        <div id="legend-bar" class="overflow-hidden rounded-2"></div>
        <div id="legend-ticks"></div>
      </div>
      <div id="legend-outlier-pos-wrap" class="d-none d-flex flex-column ps-2">
        <div class="d-flex align-items-center justify-content-center legend-outlier-wrap">
          <div id="legend-outlier-dot-pos" class="legend-outlier-dot"></div>
        </div>
        <div id="legend-outlier-count-pos" class="text-center"></div>
      </div>
    </div>
  </div>
  </div>
</div>
<div id="container" class="container-xxl"></div>
<footer id="chain-panel" class="container-xxl"></footer>
<script src="https://cdn.jsdelivr.net/npm/d3@7.8.5/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3.1.0/dist/topojson-client.min.js"></script>
<script type="module">
// One module now (previously two): the chain snake and the #map-container widget
// above it are interlinked — clicking a flag in the snake dims/arcs and pans/zooms
// the map — so both need to share scope (byId/importByCountry/centroids/
// worldFeatures/ukFeatures, the chain's own render/selection state). A trimmed copy
// of wc2026_map.html's own map widget: world choropleth + zoom/theme controls +
// legend + collapsible/draggable-resize bar + dim/arc mode, with no tooltips, player
// table, or Elo sidebar (none of that applies to this page — its only per-country
// interaction is "click a flag in the snake, or on the map itself, to dim+arc and
// zoom there"). Everything importable from shared modules is imported, not copied;
// the rest (not exported anywhere) is a deliberate, documented duplication of small
// pieces of js/wc2026_map.js — see chains/DUP.md for the full accounting of what's
// copied vs. shared.
import { renderChain } from './wc2026_chain_render.js';
import { choroFill, currentTheme, onThemeChange, FLAG_CDN, FLAG,
         buildChoroplethIndex, paintChoropleth, wireLegend,
         CENTROID_OVERRIDE, dotCentroid, zoomToCentroid,
         drawCountryArcs, rescaleArcs, computeImportIds } from '../js/map-container.js';
import { animateFlagOpacity } from '../js/flag_visibility.js';
import { QUALIFIED_NAMES, QUALIFIED_BY_NAME } from '../js/qualified.js';
import { T, loadWikiData, findPlayerWikiUrl } from '../js/i18n.js';
import { ISO2_REVERSE } from '../js/iso2.js';

const _wm = document.querySelector('world-map');
const { svg, g, projection, path, zoom } = _wm;
document.getElementById('zoom-hint').textContent = T.zoomHint;

const [mapData, eloData, ukNations, world] = await Promise.all([
  fetch('../data/v2/map.json').then(r => r.json()),
  fetch('../data/elo_rank.json').then(r => r.json()),
  fetch('../data/uk-nations.geojson').then(r => r.json()),
  d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json'),
  loadWikiData('../'),
]);

// byId/importByCountry — only what choroFill()/THEMES.*.metric and the dim/arc mode
// below actually read; see map-container.js's buildChoroplethIndex for what it
// deliberately leaves out (pop/totalCount/tooltip indices — wc2026_map.js-only concerns).
const { byId, importByCountry } = buildChoroplethIndex(mapData);

// World choropleth + mesh borders + UK home nations (Kosovo id patch included) —
// same shared painter wc2026_map.js's renderWorld() now calls too. No mousemove/
// click/cursor wiring chained on afterward (no tooltip or dim mode on this page).
const { worldFeatures, ukFeatures } = paintChoropleth(g, path, world, ukNations, byId);

// ── Centroids (for zoomToCentroid — flags below, and chain-flag clicks further
// down) — dotCentroid applies the same France/USA/Croatia overrides wc2026_map.js's
// own flag placement does; UK features go through their own direct CENTROID_OVERRIDE
// lookup by _id instead (dotCentroid only checks .id), mirroring wc2026_map.js. ─────
const centroids = {};
worldFeatures.forEach(f => { if (f.id) centroids[+f.id] = dotCentroid(f, projection, path); });
ukFeatures.forEach(f => {
  if (!f._id) return;
  const ov = CENTROID_OVERRIDE[f._id];
  centroids[f._id] = ov ? projection(ov) : path.centroid(f);
});

// Arc group — below flags so arcs never cover flag icons (see CLAUDE.md's "Render
// ordering in renderWorld"). Filled in by _applyDim() below, once a flag is clicked.
const arcsGroup = g.append('g').attr('class', 'arcs-group');

// ── Qualified-country flags only — mirrors insights/perf.html's own simplification:
// no non-qualified exporters, no Cape Verde/Curaçao fixed-zoom insets. ─────────────
const ALL_QUALIFIED = eloData.rankings
  .filter(r => QUALIFIED_NAMES[r.id] && r.iso2)
  .map(r => ({ id: r.id, iso2: r.iso2.toLowerCase() }));

const flagsG = g.append('g').attr('class', 'flags');
ALL_QUALIFIED.forEach(({ id, iso2 }) => {
  const c = centroids[id];
  if (!c || !isFinite(c[0])) return;
  const [cx, cy] = c;
  flagsG.append('image')
    .classed('flag-qualified', true)
    .attr('data-id', id).attr('data-cx', cx).attr('data-cy', cy)
    .attr('href', FLAG_CDN(iso2))
    .attr('x', cx - FLAG / 2).attr('y', cy - FLAG / 2)
    .attr('width', FLAG).attr('height', FLAG)
    .attr('clip-path', 'inset(0% round 50%)')
    .style('cursor', 'pointer')
    .on('click', event => { event.stopPropagation(); _zoomAndSelect(id); });
});

// ── Zoom controls — trimmed js/wc2026_map.js (#zoom-reset wiring + a dim-mode-free
// #zoom-span/_zoomToVisibleFlags: fit every qualified flag instead of "visible" ones,
// since nothing on this page ever hides a flag). ──────────────────────────────────
const _zoomResetBtn = document.getElementById('zoom-reset');
const _zoomSpanBtn  = document.getElementById('zoom-span');
const _initialTransform = d3.zoomIdentity;
let _dimK = 1;
const _syncResetBtn = t => {
  _zoomResetBtn.disabled = Math.abs(t.k - _initialTransform.k) < 0.001
    && Math.abs(t.x - _initialTransform.x) < 0.5
    && Math.abs(t.y - _initialTransform.y) < 0.5;
};
_syncResetBtn(_initialTransform);
_wm.onZoom = e => {
  _dimK = e.transform.k;
  rescaleArcs(g, _dimK);
  _syncResetBtn(e.transform);
};
_zoomResetBtn.addEventListener('click', e => {
  e.stopPropagation();
  _clearSelection();
});
_zoomSpanBtn.addEventListener('click', e => {
  e.stopPropagation();
  const xs = [], ys = [];
  flagsG.selectAll('.flag-qualified').each(function() {
    const cx = +this.getAttribute('data-cx'), cy = +this.getAttribute('data-cy');
    if (isFinite(cx) && isFinite(cy)) { xs.push(cx); ys.push(cy); }
  });
  if (!xs.length) return;
  const [vbX, vbY, vbW, vbH] = svg.attr('viewBox').split(' ').map(Number);
  const x0 = Math.min(...xs), x1 = Math.max(...xs), y0 = Math.min(...ys), y1 = Math.max(...ys);
  const pad = 20;
  const k = Math.max(1, Math.min(9, Math.min(vbW / (x1 - x0 + 2 * pad), vbH / (y1 - y0 + 2 * pad))));
  svg.transition().duration(1500).call(zoom.transform,
    d3.zoomIdentity.translate(vbX + vbW / 2 - k * (x0 + x1) / 2, vbY + vbH / 2 - k * (y0 + y1) / 2).scale(k));
});

// ── Legend + theme toggle — map-container.js's wireLegend() (shared with
// wc2026_map.js). The map's own theme repaint (not the legend widget) is this
// page's own onThemeChange listener, same split wc2026_map.js uses. ─────────────
const legend = wireLegend({ getById: () => byId });
onThemeChange(() => {
  g.selectAll('.country').attr('fill', function(d) { return choroFill(+d.id, byId); });
  g.selectAll('.country-uk').attr('fill', function(d) { return choroFill(d._id, byId); });
});

// ── Chain snake ← → map: click a flag (in the snake, on the map above, or via the
// ocean/Escape to clear) to dim+arc and pan/zoom there, mirroring wc2026_map.js's own
// _chainOnClick/activateCountry/_zoomToActiveDimFlags/clearDim — minus the tooltip/
// player-table/Elo-sidebar integration those pull in, none of which exists on this
// page (see chains/DUP.md). Dim (opacity fade on non-linked flags) and arcs (one per
// export destination + import origin, from byId[id].nations/importByCountry) reuse
// map-container.js's drawCountryArcs/computeImportIds — the same data + arc geometry
// wc2026_map.js's own dim mode uses, just without its sidebar/tooltip-aware flag
// visibility layer (nothing on this page ever hides a flag outright). ─────────────
let chainData = null, _chainUpdate = null, _selectedId = null, resizeTimer = null;
const _getSelectedIndex = () => {
  if (!chainData || _selectedId == null) return -1;
  return chainData.nodes.findIndex(n => ISO2_REVERSE[n.code] === _selectedId);
};
const _clearDim = () => {
  animateFlagOpacity(flagsG.selectAll('.flag-qualified'), () => 1);
  arcsGroup.selectAll('.arc-line').remove();
};
const _applyDim = sourceId => {
  const rec = byId[sourceId];
  const destIds = rec ? new Map((rec.nations ?? []).flatMap(([n, c]) => {
    const did = QUALIFIED_BY_NAME[n];
    return did !== undefined ? [[did, c]] : [];
  })) : new Map();
  const importIds = computeImportIds(sourceId, importByCountry);
  const linkedIds = new Set([...destIds.keys(), ...importIds.keys()]);
  animateFlagOpacity(flagsG.selectAll('.flag-qualified'), el => {
    const id = +el.getAttribute('data-id');
    return (id === sourceId || linkedIds.has(id)) ? 1 : 0.35;
  });
  drawCountryArcs(arcsGroup, sourceId, destIds, importIds, centroids, _dimK);
};
const _clearSelection = () => {
  if (_selectedId == null) return;
  _selectedId = null;
  _clearDim();
  _chainUpdate?.(_getSelectedIndex());
  svg.transition().duration(400).call(zoom.transform, _initialTransform);
};
const _zoomAndSelect = id => {
  if (_selectedId === id) { _clearSelection(); return; }
  _selectedId = id;
  _applyDim(id);
  zoomToCentroid({ svg, zoom, path, centroids, worldFeatures, ukFeatures }, id, 1200);
  _chainUpdate?.(_getSelectedIndex());
  requestAnimationFrame(() => _chainUpdate?.scrollActive());
};
const _chainOnClick = node => {
  const id = ISO2_REVERSE[node.code];
  if (id != null) _zoomAndSelect(id);
};
svg.on('click', () => _clearSelection());
document.addEventListener('keydown', e => { if (e.key === 'Escape') _clearSelection(); });

const container = document.getElementById('container');
// renderChain() clears whatever container it's given (container.innerHTML = '') on
// every render — a dedicated child holds the SVG so the fwd/bwd/both toggle below,
// inserted as its sibling, survives every re-render (mode switch, resize). Same
// #chain-content/outer-tab split js/wc2026_map.js's own chain tab uses.
const chainContent = document.createElement('div');
chainContent.id = 'chain-content';
container.appendChild(chainContent);

const chainPanelEl = document.getElementById('chain-panel');
const _renderChainOpts = {
  onCountryClick:   _chainOnClick,
  getSelectedIndex: _getSelectedIndex,
  headerContainer:  chainPanelEl,
  // Player name → {href, fallback}, shared with wc2026_map.js's own chain tab via
  // i18n.js's findPlayerWikiUrl (app.byId there, local byId here).
  getPlayerWikiUrl: name => findPlayerWikiUrl(name, byId),
};
const _renderChainNow = () => { if (chainData) _chainUpdate = renderChain(chainData, chainContent, _renderChainOpts); };

// ── fwd/bwd/both direction toggle — moved here from js/wc2026_map.js's chain tab
// (cut, not duplicated: that tab now always shows just the "both" variant). Only
// shown when ?data= names one of the three precomputed longest-chain variants below,
// or is left off entirely (defaulting to "both") — an arbitrary ?data= file (e.g.
// wc2026_chain_loop.json) has no fwd/bwd counterpart, so single-file mode applies
// exactly as before. ────────────────────────────────────────────────────────────
const chainVariants = {}; // {both, fwd, bwd}
let chainMode = 'both';
const _switchChainMode = mode => {
  if (!chainVariants[mode]) return;
  chainMode = mode;
  chainData = chainVariants[mode];
  document.querySelectorAll('#chain-mode-toggle .chain-mode-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === mode);
  });
  _renderChainNow();
};
const _VARIANT_MODE_BY_FILE = {
  'subgraphs/longest_both.json': 'both',
  'subgraphs/longest_fwd.json':  'fwd',
  'subgraphs/longest_bwd.json':  'bwd',
};
const _dataParam = new URLSearchParams(location.search).get('data');
const _initialMode = _dataParam ? (_VARIANT_MODE_BY_FILE[_dataParam] ?? null) : 'both';

if (_initialMode) {
  Promise.all([
    fetch('subgraphs/longest_both.json').then(r => r.json()),
    fetch('subgraphs/longest_fwd.json').then(r => r.json()),
    fetch('subgraphs/longest_bwd.json').then(r => r.json()),
  ]).then(([both, fwd, bwd]) => {
    chainVariants.both = both;
    chainVariants.fwd = fwd;
    chainVariants.bwd = bwd;
    chainMode = _initialMode;
    chainData = chainVariants[_initialMode];
    container.insertAdjacentHTML('afterbegin', `<div class="d-flex justify-content-center gap-1 py-2" id="chain-mode-toggle">
      <button class="chain-mode-btn" data-mode="bwd" title="Import direction">← import</button>
      <button class="chain-mode-btn active" data-mode="both" title="Both directions">both</button>
      <button class="chain-mode-btn" data-mode="fwd" title="Export direction">export →</button>
    </div>`);
    document.querySelectorAll('#chain-mode-toggle .chain-mode-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.mode === chainMode);
      btn.addEventListener('click', () => _switchChainMode(btn.dataset.mode));
    });
    _renderChainNow();
  }).catch(e => { chainContent.textContent = 'Error: ' + e.message; });
} else {
  fetch(_dataParam)
    .then(r => r.json())
    .then(chain => { chainData = chain; _renderChainNow(); })
    .catch(e => { chainContent.textContent = 'Error: ' + e.message; });
}

window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(_renderChainNow, 150);
});

// #chain-panel is position:fixed (bottom) — body needs matching padding-bottom so
// #container's own last rows never end up hidden underneath it, same idea
// #map-container's own _syncBodyPadding (above) already applies at the top.
new ResizeObserver(() => { document.body.style.paddingBottom = chainPanelEl.getBoundingClientRect().height + 'px'; }).observe(chainPanelEl);

// ── Map-toggle-bar collapse + body padding-top sync — trimmed js/wc2026_map.js
// (Bootstrap Collapse wiring + _syncPaddingTop). This page has no bottom-tab-bar/
// landscape-mobile special case, so a plain ResizeObserver on #map-container stands
// in for wc2026_map.js's own rAF-polling-during-transition loop — simpler because
// the need here is simpler, not a byte-for-byte copy. Own localStorage keys
// (mundial-chain-map-* rather than mundial-map-*) so this page's map preferences
// stay independent of wc2026_map.html's. ──────────────────────────────────────────
const _mc = document.getElementById('map-container');
const _mapCollapseEl = document.getElementById('map-collapse');
const _mapToggleBar  = document.getElementById('map-toggle-bar');
const _mapCollapse   = bootstrap.Collapse.getOrCreateInstance(_mapCollapseEl, { toggle: false });
const _MAP_COLLAPSED_KEY = 'mundial-chain-map-collapsed';
const _paintMapToggleChevron = expanded => { _mapToggleBar.textContent = expanded ? '⌄' : '⌃'; };
const _syncBodyPadding = () => { document.body.style.paddingTop = _mc.getBoundingClientRect().bottom + 'px'; };
new ResizeObserver(_syncBodyPadding).observe(_mc);
_mapCollapseEl.addEventListener('show.bs.collapse', () => _paintMapToggleChevron(true));
_mapCollapseEl.addEventListener('hide.bs.collapse',  () => _paintMapToggleChevron(false));
_mapCollapseEl.addEventListener('shown.bs.collapse',  () => localStorage.setItem(_MAP_COLLAPSED_KEY, '0'));
_mapCollapseEl.addEventListener('hidden.bs.collapse', () => localStorage.setItem(_MAP_COLLAPSED_KEY, '1'));
_mapToggleBar.title = T.sortLabels.mapHint;
_mapToggleBar.setAttribute('aria-label', T.sortLabels.map);
if (localStorage.getItem(_MAP_COLLAPSED_KEY) === '1') {
  _mapCollapseEl.classList.remove('show');
  _paintMapToggleChevron(false);
  _mapToggleBar.setAttribute('aria-expanded', 'false');
}
_syncBodyPadding();

// ── #legend-parent drag-resize + grip icon — same behavior just added to
// wc2026_map.html/js/wc2026_map.js (own localStorage key; not exported there either). ──
const _MAP_HEIGHT_KEY = 'mundial-chain-map-height';
const _legendParent = document.getElementById('legend-parent');
const _storedMapHeight = parseFloat(localStorage.getItem(_MAP_HEIGHT_KEY));
if (_storedMapHeight) document.getElementById('map').style.height = _storedMapHeight + 'px';
{
  let _dragStartY = 0, _dragStartHeight = 0, _dragOtherHeight = 0, _dragging = false;
  _legendParent.addEventListener('pointerdown', e => {
    if (e.target.closest('button')) return;
    const mapEl = document.getElementById('map');
    _dragging = true;
    _dragStartY = e.clientY;
    _dragStartHeight = mapEl.getBoundingClientRect().height;
    _dragOtherHeight = _mc.getBoundingClientRect().height - _dragStartHeight;
    _legendParent.setPointerCapture(e.pointerId);
  });
  _legendParent.addEventListener('pointermove', e => {
    if (!_dragging) return;
    const minH = 120;
    const maxH = window.innerHeight - _mc.getBoundingClientRect().top - _dragOtherHeight - 20;
    const h = Math.max(minH, Math.min(maxH, _dragStartHeight + (e.clientY - _dragStartY)));
    document.getElementById('map').style.height = h + 'px';
    _syncBodyPadding();
  });
  const _endMapDrag = () => {
    if (!_dragging) return;
    _dragging = false;
    localStorage.setItem(_MAP_HEIGHT_KEY, parseFloat(document.getElementById('map').style.height));
  };
  _legendParent.addEventListener('pointerup', _endMapDrag);
  _legendParent.addEventListener('pointercancel', _endMapDrag);
}
</script>
</body>
</html>
