<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA Ranking · Mondial 2026</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f5f2ec; min-height: 100vh; font-family: system-ui, sans-serif; }
#container { max-width: 480px; margin: 0 auto; padding: 24px 16px 48px; }
.fifa-header { display: flex; flex-direction: column; gap: 2px; margin-bottom: 10px; }
.fifa-title { font-size: 14px; font-weight: 500; color: #1a1a18; }
.fifa-meta { font-size: 10px; color: #999; }
.fifa-list { list-style: none; }
.fifa-item { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid #ede9e1; }
.fifa-item:last-child { border-bottom: none; }
.fifa-rank { width: 28px; text-align: right; font-size: 12px; color: #aaa; flex-shrink: 0; font-variant-numeric: tabular-nums; }
.fifa-flag { width: 24px; height: 24px; flex-shrink: 0; }
.fifa-name { font-size: 13px; color: #1a1a18; }
</style>
</head>
<body>
<div id="container">
  <div id="list"></div>
</div>
<script type="module">
import { renderFifaRanking } from './wc2026_fifa_ranking.js';
renderFifaRanking(document.getElementById('list'));
</script>
</body>
</html>
