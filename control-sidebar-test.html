<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>control-sidebar test harness</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/taxonomy.css">
<link rel="stylesheet" href="css/control-sidebar.css">
</head>
<body>
<p>Real initSidebar()/elo-ranking wiring, real data, the real stylesheets (global/taxonomy/control-sidebar.css) — a faithful preview environment for iterating on css/control-sidebar.css without the map page's own layout/backend noise. Visible: <span id="visible-country-count"></span></p>
<div id="page-header">
  <div id="sidebar-host"></div>
</div>
<elo-ranking id="list"></elo-ranking>

<script type="module">
import { initEloRanking } from './js/elo_ranking.js';
import { QUALIFIED_NAMES, QUALIFIED_BY_NAME, buildImportByCountry, buildBracketState, buildMatchInfo, buildNameByIso2, loadEloData } from './js/qualified.js';
import { LOCALE, T, countryName } from './js/i18n.js';
import { initSidebar } from './js/control_sidebar.js';

const [{ eloData, statusByIso2 }, mapData, fixturesData] = await Promise.all([
  loadEloData(),
  fetch('./data/v2/map.json').then(r => r.json()),
  fetch('./data/fixtures.json').then(r => r.json()).catch(() => null),
]);

const byId = Object.fromEntries((mapData.data ?? []).map(d => [d.id, d]));
const fifaMemberIds = new Set(eloData.rankings.filter(r => r.fifaMember).map(r => r.id));
const importByCountry = buildImportByCountry(mapData, countryName);
const nativeByCountry = {};
Object.entries(mapData.natives ?? {}).forEach(([name, players]) => {
  const nId = QUALIFIED_BY_NAME[name];
  if (nId != null) nativeByCountry[nId] = players;
});

const app = { byId, importByCountry };
const fmtPop = n => new Intl.NumberFormat(LOCALE, { notation: 'compact', maximumFractionDigits: 1 }).format(n);

const el = document.getElementById('list');
const sidebarCallbacks = {};
// No alwaysOpen — defaults to the same collapsible/swipe-drawer sidebar wc2026_map.html
// uses (not wc2026_countries.html's simplified always-open variant), since that's the
// harder, more representative case for the CSS refactor.
const sidebar = initSidebar({ T, QUALIFIED_NAMES, app, fifaMemberIds, eloMain: el, callbacks: sidebarCallbacks });

const { render: renderElo, rawItems } = initEloRanking({
  el, sidebar,
  buildArgs: { rankings: eloData.rankings, byId, importByCountry, nativeByCountry, countryNameFn: countryName, pop: mapData.pop, statusByIso2, fixturesData },
  fmtPop, eloData,
  popData: { source: mapData.popSource, updated: mapData.popUpdated },
});
app.stageIndexById = new Map(rawItems.map(item => [item.id, item.visibleThroughIndex]));
app.bracketState = buildBracketState(statusByIso2, eloData.rankings.filter(r => QUALIFIED_NAMES[r.id] && r.iso2).map(r => r.iso2), fixturesData);
app.matchInfoByIso2 = buildMatchInfo(statusByIso2, fixturesData, buildNameByIso2(eloData.rankings, countryName));
sidebar.updateStageTitle();
sidebarCallbacks.renderElo = renderElo;
renderElo();
sidebar.applyParams(new URLSearchParams(location.search));
</script>
</body>
</html>
