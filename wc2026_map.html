<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/png" href="/realfavicongenerator/favicon-96x96.png?v=20260611" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="/realfavicongenerator/favicon.svg?v=20260611" />
<link rel="shortcut icon" href="/realfavicongenerator/favicon.ico?v=20260611" />

<meta name="mobile-web-app-capable" content="yes">
<meta name="description"         content="A D3.js choropleth map of the 2026 FIFA World Cup: players born in one country, playing for another.">
<meta property="og:title"       content="Thiebaud's Mundial">
<meta property="og:description" content="A D3.js choropleth map of the 2026 FIFA World Cup: players born in one country, playing for another.">
<meta property="og:image"            content="https://mundial.cthiebaud.com/wc2026_og_v7.jpg">
<meta property="og:image:url"        content="https://mundial.cthiebaud.com/wc2026_og_v7.jpg">
<meta property="og:image:secure_url" content="https://mundial.cthiebaud.com/wc2026_og_v7.jpg">
<meta property="og:image:type"       content="image/jpeg">
<meta property="og:image:width"      content="4320">
<meta property="og:image:height"     content="2430">

<meta property="og:url"         content="https://mundial.cthiebaud.com/">
<meta property="og:type"        content="website">
<meta name="twitter:card"       content="summary_large_image">
<link rel="stylesheet" href="css/bootstrap-custom.min.css"><!-- test swap, see css/bootstrap-custom.scss -->
<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/wc2026_map.css">
<link rel="stylesheet" href="css/player.css">
<!-- .pt-table/.pt-th/.pt-flag/.pt-born/.pt-caps — reused as-is by the players table
     (js/wc2026_map.js's _playersTableTemplate); the page-specific #players-header/
     #players-sidebar rules in here simply don't match anything on this page. -->
<link rel="stylesheet" href="css/wc2026_players.css">
<link rel="stylesheet" href="css/map-container.css">
<link rel="stylesheet" href="css/control-sidebar.css">
<link rel="stylesheet" href="css/taxonomy.css">
<link rel="stylesheet" href="css/group_stage.css">
</head>
<body>
<script type="module" src="js/auth-bar.js"></script>
<mundial-auth-bar id="auth-bar"></mundial-auth-bar>
<header id="page-header" class="container-xxl px-0" style="margin-top:0">
  <div id="page-heading-sub" class="mx-3">
  <div>
    <div class="pq-wrap">
  <div class="pq-icons float-end d-flex flex-column align-items-end gap-1 px-2" style="width:34px;height:43px"></div>
      <div class="pq-panel pq-prev">
        <p class="pq-text fst-italic"></p>
        <p class="pq-attr"></p>
      </div>
      <div class="pq-panel pq-cur">
        <p class="pq-text fst-italic"></p>
        <p class="pq-attr"></p>
      </div>
    </div>
  </div>
  <div class="pq-dots"></div>
  </div>
  <div id="sidebar-host" style="position:absolute;top:0;right:0;z-index:10"></div>
</header>
<div id="map-container" class="flex-column container-xxl px-0 mt-0 position-relative">
  <button id="map-toggle-bar" type="button" class="map-toggle-bar" data-bs-toggle="collapse" data-bs-target="#map-collapse" aria-expanded="true" aria-controls="map-collapse">⌄</button>
  <div id="map-collapse" class="collapse show w-100">
  <div id="map-frame">
  <world-map id="map" role="img" aria-label="Choropleth map of players born in one country, playing for another"></world-map>
  <span id="zoom-hint">scroll to zoom · drag to pan</span>
  </div>
  <div id="legend-parent" class="d-flex align-items-center justify-content-between w-100 pt-1">
    <img id="legend-grip" src="images/grip-horizontal-svgrepo-com.svg" width="20" height="20" alt="" aria-hidden="true">
    <div id="map-controls" class="d-flex align-items-center gap-1">
      <button id="zoom-reset" type="button" aria-label="Reset zoom">
        <img src="images/solar_linear/global-svgrepo-com.svg" width="20" height="20" aria-hidden="true">
      </button>
      <button id="zoom-span" type="button" aria-label="Span all visible countries">
        <img src="images/solar_linear/maximize-square-2-svgrepo-com.svg" width="20" height="20" aria-hidden="true">
      </button>
      <button id="theme-toggle" type="button" aria-label="Switch map color theme" title="Switch map color theme" style="display: none; "></button>
    </div>
    <div id="legend-born" class="sub">
      <span id="legend-born-full" class="d-none d-md-inline"></span>
      <span id="legend-born-brief" class="d-md-none"></span>
    </div>
    <span id="zoom-level" hidden></span>
    <div id="legend" class="d-flex align-items-start">
      <div class="d-flex flex-column pe-2">
        <div class="d-flex align-items-center justify-content-center legend-outlier-wrap">
          <div id="legend-outlier-dot" class="legend-outlier-dot"></div>
        </div>
        <div id="legend-outlier-count" class="text-center"></div>
      </div>
      <div>
        <div id="legend-bar" class="overflow-hidden rounded-2"></div>
        <div id="legend-ticks"></div>
      </div>
      <!-- Diverging themes only (see map-container.js's THEMES.*.diverging) — the positive-
           side outlier (negative's is the block above, reused; see map-container.js's
           wireLegend()/updateOutlier). Hidden for sequential themes, which have just the one outlier.
           d-none+d-flex pair (not a plain `hidden` attribute) — Bootstrap's .d-flex carries
           !important, which always beats the UA stylesheet's non-important [hidden] rule, so a
           bare `hidden` attribute here would silently never actually hide it. Same pattern
           auth-bar.js already uses for its sign-in/signed-out toggle. -->
      <div id="legend-outlier-pos-wrap" class="d-none d-flex flex-column ps-2">
        <div class="d-flex align-items-center justify-content-center legend-outlier-wrap">
          <div id="legend-outlier-dot-pos" class="legend-outlier-dot"></div>
        </div>
        <div id="legend-outlier-count-pos" class="text-center"></div>
      </div>
    </div>
  </div>
  </div>
</div>

<!-- Debug tool for tuning the violet theme's diverging color scale live — see
     map-container.js's getDivergingParams()/setDivergingParams() and the
     wiring right after the legend/theme-toggle setup in js/wc2026_map.js. Only has a
     visible effect while the Violet theme is active. -->
<details id="diverging-debug" class="container-xxl my-2 sub" open style="display:none">
  <summary style="cursor:pointer;">Diverging scale debug (Violet theme only)</summary>
  <div class="d-flex flex-wrap gap-3 align-items-end py-2">
    <label class="d-flex flex-column">Neutral (v = 0)
      <input type="color" id="dbg-neutral">
    </label>
    <label class="d-flex flex-column">Left color — negative / "plays for"
      <input type="color" id="dbg-easy-left">
    </label>
    <label class="d-flex flex-column">Right color — positive / "born in"
      <input type="color" id="dbg-easy-right">
    </label>
    <label class="d-flex flex-column">Left outlier dot
      <input type="color" id="dbg-outlier-left">
    </label>
    <label class="d-flex flex-column">Right outlier dot
      <input type="color" id="dbg-outlier-right">
    </label>
    <label class="d-flex flex-column">Left algo
      <select id="dbg-algo-left">
        <option value="power">power</option>
        <option value="smoothstep">smoothstep</option>
      </select>
    </label>
    <label class="d-flex flex-column">Left ease (power only) <span id="dbg-ease-left-val"></span>
      <input type="range" id="dbg-ease-left" min="0.2" max="3" step="0.1">
    </label>
    <label class="d-flex flex-column">Right algo
      <select id="dbg-algo-right">
        <option value="power">power</option>
        <option value="smoothstep">smoothstep</option>
      </select>
    </label>
    <label class="d-flex flex-column">Right ease (power only) <span id="dbg-ease-right-val"></span>
      <input type="range" id="dbg-ease-right" min="0.2" max="3" step="0.1">
    </label>
    <label class="d-flex flex-column">Left floor (v≠0 min) <span id="dbg-floor-left-val"></span>
      <input type="range" id="dbg-floor-left" min="0" max="0.5" step="0.01">
    </label>
    <label class="d-flex flex-column">Right floor (v≠0 min) <span id="dbg-floor-right-val"></span>
      <input type="range" id="dbg-floor-right" min="0" max="0.5" step="0.01">
    </label>
    <button id="dbg-reset" type="button" class="btn btn-sm btn-outline-secondary">Reset</button>
  </div>
</details>

<main id="bottomTabContent" class="container-xxl px-4">
  <div id="tab-teams" class="taxonomy"></div>
  <div id="tab-tournament" class="taxonomy" hidden></div>
  <div id="tab-players" hidden></div>
</main>

<footer id="bottom-panel" class="container-xxl ">
  <button id="scroll-top-btn" aria-label="Scroll to top"><svg width="10" height="7" viewBox="-4 -4 18 15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 6L5 2L9 6"/></svg></button>
  <div id="selection-panel" class="tab-footer-panel collapsed"></div>
  <nav id="bottomTabList" class="py-2 d-flex justify-content-between gap-4">
    <button class="nav-link active" id="tab-teams-btn" data-tab="tab-teams" type="button"><img class="tab-icon" src="images/solar_linear/ranking-svgrepo-com.svg" aria-hidden="true"></button>
    <button class="nav-link flex-grow-1" id="tab-players-btn" data-tab="tab-players" type="button"></button>
    <button class="nav-link" id="tab-tournament-btn" data-tab="tab-tournament" type="button"><img class="tab-icon" src="images/world-cup-svgrepo-com.svg" aria-hidden="true"></button>
    <div id="tab-indicator"></div>
  </nav>
</footer>

<div id="tooltip"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3@7.8.5/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3.1.0/dist/topojson-client.min.js"></script>
<script type="module" src="js/wc2026_map.js"></script>
<script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
