<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elo Ranking · Mondial 2026</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="wc2026_map.css">
</head>
<body>
<div class="container py-4 pb-5">
  <header class="mb-4">
    <h1 class="fs-5 fw-semibold mb-1">World Football Elo Rankings</h1>
    <p class="sub mb-0"><span id="elo-count"></span> nations · source: <a id="elo-source-link" href="https://www.eloratings.net/" target="_blank" rel="noopener" class="sub">eloratings.net</a> · updated <span id="elo-date"></span></p>
  </header>
  <div id="list"></div>
</div>
<script type="module">
import { renderEloRanking } from './wc2026_elo_ranking.js';
import { countryName } from './i18n.js';

fetch('./wc2026_elo_rank.json')
  .then(r => r.json())
  .then(data => {
    document.getElementById('elo-date').textContent = data.updated ?? '';
    document.getElementById('elo-count').textContent = data.rankings.length;
    const items = data.rankings.map(({id, rank, pts, iso2, name, fifaMember, weirdo}) => ({
      id, rank, pts, iso2, name: countryName(id, name),
      fifaMember, weirdo,
    }));
    renderEloRanking(document.getElementById('list'), {
      items,
      source: data.source,
      date:   data.updated,
    });
  });
</script>
</body>
</html>
