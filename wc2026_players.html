<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Players & Coaches · Mundial 2026</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7/css/flag-icons.min.css">
<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/player.css">
<link rel="stylesheet" href="css/wc2026_players.css">
<link rel="stylesheet" href="css/taxonomy.css">
<link rel="stylesheet" href="css/control-sidebar.css">
</head>
<body>
<script type="module" src="js/auth-bar.js"></script>
<mundial-auth-bar></mundial-auth-bar>
<header id="players-header" class="container-xxl px-0">
  <div class="d-flex flex-wrap justify-content-between align-items-start gap-2 py-2 mx-3">
    <div>
      <h1 class="fs-5 fw-semibold mb-1">World Cup 2026 · Players & Coaches</h1>
      <p class="sub mb-0" id="players-meta"></p>
    </div>
    <div id="sidebar-host"></div>
  </div>
</header>
<div id="main-content" class="container pb-2 taxonomy">
  <table class="table table-sm table-striped table-hover pt-table">
    <thead><tr id="player-list-head"></tr></thead>
    <tbody id="player-list"></tbody>
  </table>
</div>
<script type="module">
import { html, render, nothing } from 'https://cdn.jsdelivr.net/npm/lit-html@3/lit-html.js';
import { wikiUrl, wikiUrlEn, loadWikiData, T, countryName } from './js/i18n.js';
import { QUALIFIED_BY_NAME, buildImportByCountry, buildEloItems, loadEloData } from './js/qualified.js';
import { iso2ForId, _NULL_CODE } from './js/iso2.js';
import { initPlayersSidebar } from './js/players_sidebar.js';

const _header = document.getElementById('players-header');
const _main   = document.getElementById('main-content');
const _titleBlock = _header.querySelector('.d-flex > div:first-child');
const _sidebarHost = document.getElementById('sidebar-host');
// #sidebar-host wraps onto its own line once it no longer fits beside the title —
// detected directly from layout (offsetTop diverging) rather than guessed via a
// media query breakpoint, since the wrap point shifts with title text length
// (locale-dependent) and the sidebar table's own width (filter-state-dependent).
const _syncHeaderLayout = () => {
  const headerBottom = _header.getBoundingClientRect().bottom;
  _main.style.paddingTop = (headerBottom + 6) + 'px';
  // Same measured value drives the sticky table header's own offset (see .pt-th's
  // position:sticky in css/wc2026_players.css) — it needs to stick right below the fixed
  // #players-header, whatever that header's current height is (title-only vs. stacked with
  // the sidebar wrapped beneath it).
  document.documentElement.style.setProperty('--players-header-h', headerBottom + 'px');
  // .stacked forces #sidebar-host to width:100%, which by itself guarantees it no
  // longer fits beside the title — checking offsetTop while that's still applied
  // would always read "wrapped" and could never un-stack on a resize back to wide.
  // Clear it first so the measurement reflects the natural (unforced) layout.
  _header.classList.remove('stacked');
  _header.classList.toggle('stacked', _sidebarHost.offsetTop > _titleBlock.offsetTop);
};
requestAnimationFrame(_syncHeaderLayout);
window.addEventListener('resize', _syncHeaderLayout);

const [{ eloData, statusByIso2 }, mapData] = await Promise.all([
  loadEloData(),
  fetch('./data/v2/map.json').then(r => r.json()),
  loadWikiData(),
]);

const byId = Object.fromEntries((mapData.data ?? []).map(d => [d.id, d]));
const importByCountry = buildImportByCountry(mapData, countryName);
const nativeByCountry = {};
Object.entries(mapData.natives ?? {}).forEach(([name, players]) => {
  const nId = QUALIFIED_BY_NAME[name];
  if (nId != null) nativeByCountry[nId] = players;
});

const rawItems = buildEloItems({ rankings: eloData.rankings, byId, importByCountry, nativeByCountry, countryNameFn: countryName, pop: mapData.pop, statusByIso2 });
// Keyed by country id — the same per-country fields (rank/pop/expCount/impCount)
// teamComparators reads, looked up per player via QUALIFIED_BY_NAME[p.nation].
const rawById = new Map(rawItems.map(item => [item.id, item]));

// Every player and coach across the 48 qualified squads: exported entries (data[].players,
// already tagged with the country they represent) plus natives (born and serving the same
// country, listed separately under mapData.natives). `.native` records which of the two a
// player is — export entries are by construction born elsewhere than they play for (that's
// what makes them an export), native entries the opposite — this is the whole of
// players_sidebar.js's native/moved filter, no further lookup needed. Sorted by name once up
// front purely as a stable tie-break base — renderPlayers below re-sorts a copy by whatever
// criterion is currently active every time it runs, and Array#sort is stable, so ties within
// that re-sort naturally fall back to this alphabetical order rather than DOM/data order.
const entries = [];
for (const rec of mapData.data ?? []) {
  for (const p of rec.players ?? []) entries.push({ ...p, native: false, birthCountry: rec.country, birthCountryId: rec.id });
}
for (const [country, natives] of Object.entries(mapData.natives ?? {})) {
  const nId = QUALIFIED_BY_NAME[country];
  for (const p of natives) entries.push({ ...p, nation: country, native: true, birthCountry: country, birthCountryId: nId });
}
entries.sort((a, b) => a.name.localeCompare(b.name));

const coachCount = entries.filter(p => p.role === 'coach').length;
document.getElementById('players-meta').textContent =
  `${entries.length - coachCount} players · ${coachCount} coaches`;
_syncHeaderLayout();

const coachBadge = p => p.role === 'coach' ? html`<span class="coach-badge">${T.coach}</span>` : '';

const wikiLink = p => {
  const url = wikiUrl(p.pid);
  const en = wikiUrlEn(p.pid);
  if (url) return html`<a href="${url}" target="_blank" rel="noopener" class="pt-wiki text-decoration-none">${p.name}</a>${coachBadge(p)}`;
  if (en) return html`${p.name} (<a href="${en}" target="_blank" rel="noopener" class="pt-wiki text-decoration-none">en</a>)${coachBadge(p)}`;
  return html`${p.name}${coachBadge(p)}`;
};

// flag-icons (css/flag-icons.min.css, linked in <head>) — same "fi fi-<iso2>" span pattern
// wc2026_live.html already uses. Birth country can be any country in the world (not just a
// qualified team), so it goes through iso2ForId (js/iso2.js's shared id→iso2 table, falling
// back to iso-3166-1 for anything not hardcoded there) with the same _NULL_CODE fallback for
// the handful of id=null historical/alias names. "Plays for" is always one of the 48 qualified
// teams, so its flag reuses buildEloItems' own .iso2 (already resolved, no extra lookup).
const flagSpan = iso2 => iso2 ? html`<span class="fi fi-${iso2} pt-flag"></span>` : nothing;
const birthFlag = p => flagSpan(p.birthCountryId != null ? iso2ForId(p.birthCountryId) : (_NULL_CODE[p.birthCountry] ?? null));
const playsForFlag = p => {
  const teamId = QUALIFIED_BY_NAME[p.nation];
  return flagSpan(teamId != null ? rawById.get(teamId)?.iso2 : null);
};

// Table-header sort UI (click a column to sort by it, click again to reverse) — drives the same
// sidebar state the filter panel's own sort controls do (players_sidebar.js's setSort), so the
// two can never disagree about what's currently sorting the list.
const _sortArrow = () => sidebar.sortDir === 'asc' ? ' ▾' : ' ▴';
// With only natives shown (sidebar.onlyNative — moved unchecked), "born in" and "plays for" are
// the same string for every row by construction, so the two columns collapse into one. Its
// click target is whichever of 'birth'/'team' is already active (so a repeat click still just
// reverses direction, same as any other header); defaults to 'team' otherwise.
const renderHead = () => {
  const mode = sidebar.sortMode;
  const th = (key, label) => html`<th class="pt-th${mode === key ? ' pt-th-active' : ''}" @click=${() => sidebar.setSort(key)}>${label}${mode === key ? _sortArrow() : ''}</th>`;
  const cols = sidebar.onlyNative
    ? [th('player', T.psbLabels.byPlayer), th(mode === 'birth' ? 'birth' : 'team', `${T.chainLegend.bornIn} / ${T.chainLegend.playsFor}`)]
    : [th('player', T.psbLabels.byPlayer), th('birth', T.chainLegend.bornIn), th('team', T.chainLegend.playsFor)];
  render(html`${cols}`, document.getElementById('player-list-head'));
};

// sidebar.sortPlayers filters (native/moved, confederation, tournament stage) and sorts
// (by team standing, player name, or birth country) in one pass — see players_sidebar.js's own
// comment. Re-renders the header alongside the body so the active-column arrow always matches.
const renderPlayers = () => {
  const sorted = sidebar.sortPlayers(entries);
  renderHead();
  const merged = sidebar.onlyNative;
  render(html`
    ${sorted.map(p => html`
      <tr>
        <td>${wikiLink(p)}</td>
        ${merged ? nothing : html`<td class="pt-born text-nowrap">${birthFlag(p)}${p.birthCountry}</td>`}
        <td class="pt-caps text-nowrap">${playsForFlag(p)}${p.nation}</td>
      </tr>`)}
  `, document.getElementById('player-list'));
};

const sidebar = initPlayersSidebar({ T, rawById, callbacks: { onChange: renderPlayers } });
renderPlayers();
sidebar.applyParams(new URLSearchParams(location.search));
// initPlayersSidebar renders the whole filter/sort/carousel panel into #sidebar-host after the
// _syncHeaderLayout() call above (the one right after setting #players-meta's text) already
// ran — that earlier call measured #players-header before the sidebar existed, so #main-content
// ends up under-padded (the fixed header is visually taller than what was measured) until a
// window resize happens to trigger a re-sync. One more pass, now that the sidebar's real DOM is
// in place, fixes the initial load.
requestAnimationFrame(_syncHeaderLayout);
</script>
</body>
</html>
