<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guide — Thiebaud's Mundial</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/taxonomy.css">
<link rel="stylesheet" href="css/guide.css">
</head>
<body>
<mundial-auth-bar></mundial-auth-bar>
<script type="module" src="js/auth-bar.js"></script>
<a id="github-link" href="https://github.com/born-in-plays-for" target="_blank" rel="noopener" aria-label="GitHub">
  <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8"/></svg>
</a>
<div id="wip-banner">
  <div id="wip-box">
    <div id="wip-title">WORK IN PROGRESS</div>
    <div id="wip-sub">This guide is under construction</div>
  </div>
</div>
<div id="guide-body"><p id="loading">Loading…</p></div>
<script type="module">
import { marked }  from 'https://cdn.jsdelivr.net/npm/marked@14/+esm';
import { countryName } from './js/i18n.js';
import mermaid     from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

mermaid.initialize({ startOnLoad: false, theme: 'neutral', fontFamily: 'inherit' });

marked.use({
  hooks: {
    postprocess(html) {
      return html.replace(/<table>/g, '<table class="table table-bordered">');
    }
  },
  renderer: {
    image({ href, title, text }) {
      const src = href.startsWith('http') ? href : `guide/${href}`;
      return `<img class="img-fluid d-block" src="${src}" alt="${text}"${title ? ` title="${title}"` : ''}>`;
    },
    code({ text, lang }) {
      if (lang === 'mermaid') return `<pre class="mermaid">${text}</pre>`;
      return false;
    }
  }
});

const lang = new URLSearchParams(location.search).get('lang') ?? ['fr', 'de', 'it', 'es'].find(l => (navigator.languages?.[0] ?? '').startsWith(l)) ?? 'en';
const el   = document.getElementById('guide-body');

const urls = [`guide/built/${lang}-map.md`, 'guide/built/en-map.md'];
let md = null;
for (const url of urls) {
  const r = await fetch(url);
  if (r.ok) { md = await r.text(); break; }
}

if (!md) {
  el.innerHTML = '<p id="loading">Guide not built — run: <code>python3 guide/build_guide.py</code></p>';
} else {
  el.innerHTML = marked.parse(md);
  el.querySelectorAll('.elo-name[data-id]').forEach(span => {
    span.textContent = countryName(+span.dataset.id, span.textContent);
  });
  await mermaid.run();
}
</script>
</body>
</html>
