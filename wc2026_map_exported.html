<head>

<meta name="description"         content="A D3.js choropleth map of the 2026 FIFA World Cup: players born in one country, playing for another.">
<meta property="og:title"       content="Thiebaud's Mundial">
<meta property="og:description" content="A D3.js choropleth map of the 2026 FIFA World Cup: players born in one country, playing for another.">

</head>
<body>
<header id="page-header" class="container-xxl px-0">
  <div id="page-heading-sub" class="mx-3">
    <div class="d-flex flex-column align-items-start h-100">
      <p class="pq-text fst-italic"></p>
      <p class="pq-attr"></p>
      <div id="legend" class="mt-auto pt-2 d-flex align-items-center gap-2"><!-- align-self-end -->
        <div class="d-flex flex-column pe-2">
          <div class="d-flex align-items-center justify-content-center" style="height:10px">
            <div style="width:10px;height:10px;border-radius:50%;background:#000"></div>
          </div>
          <div id="legend-outlier-count" class="text-center" style="font-size:10px;color:var(--color-dim);margin-top:3px"></div>
        </div>
        <div>
          <div id="legend-bar" class="overflow-hidden rounded-2"></div>
          <div id="legend-ticks" class="d-flex justify-content-between"><span>66</span><span>55</span><span>35</span><span>15</span><span>0</span></div>
        </div>
      </div>
    </div>
  </div>
</header>
<div id="map-container" class="container-xxl px-0 mt-0 position-relative">
  <svg id="map" viewBox="0 0 900 480" role="img" aria-label="Choropleth map of players born in one country, playing for another"></svg>
  <span id="zoom-hint" class="position-absolute">scroll to zoom · drag to pan</span>
</div>
<div id="map-fade"></div>

<main id="bottomTabContent" class="container-xxl px-4 mt-3">
  <div id="tab-elo"></div>
  <div id="tab-players" hidden></div>
  <div id="tab-chain" hidden></div>
</main>

<footer id="bottom-panel">
  <div id="tab-elo-panel" class="tab-footer-panel">
    <div class="container-xxl px-4 pt-3 pb-1">
      <header>
        <h1 class="fs-5 fw-semibold mb-1">World Football Elo Rankings</h1>
        <p class="sub mb-0"><span id="elo-count">243</span> nations · source: <a id="elo-source-link" href="https://www.eloratings.net/" target="_blank" rel="noopener" class="sub">eloratings.net</a> · updated <span id="elo-date">2026-06-13</span></p>
      </header>
    </div>
  </div>
  <div id="tab-chain-panel" class="tab-footer-panel collapsed">
    <div id="chain-panel-header" class="container-xxl px-4"></div>
  </div>
  <nav id="bottomTabList" class="container-xxl px-4 py-2 d-flex justify-content-between gap-2">
    <button class="nav-link active" id="tab-elo-btn" data-tab="tab-elo" type="button"><img class="tab-icon" src="images/elo_tab_icon.svg" aria-hidden="true"></button>
    <button class="nav-link" id="tab-players-btn" data-tab="tab-players" type="button"><img class="tab-icon" src="images/empty_tab_icon.svg" aria-hidden="true"></button>
    <button class="nav-link" id="tab-chain-btn" data-tab="tab-chain" type="button"><img class="tab-icon" src="images/chain_tab_icon.svg" aria-hidden="true"></button>
  </nav>
</footer>

<div id="tooltip"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3@7.8.5/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3.1.0/dist/topojson-client.min.js"></script>
<script type="module" src="wc2026_map.js"></script>
<script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
